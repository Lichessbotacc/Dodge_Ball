// ---------------- STATE ----------------
let balls = [];

let ranking = [];
let multiplayerScores = [
{name:"Spieler 1",points:0},
{name:"Spieler 2",points:0}
];

let playerMatchMap = new Map();

const HUMAN_NAME = "DU";

// ---------------- PLAYER FACTORY ----------------
function createPlayer(x,y,color,name,skill=null){

skill = Math.random();

const base = skill;

return {
    x,
    y,
    radius: playerRadiusSetting,
    color,
    name,
    points: 0,
    elo: 1500,
    lastChange: 0,
    alive: true,
    games: 0,

    skill,

    // 🔥 stark unterschiedliche Werte pro Bot
    speed: 3 + base * 6,          // 3–9 (große Unterschiede)
    reaction: 0.5 + base * 2.5,   // 0.5–3
    awareness: 120 + base * 500,  // 120–500
    randomness: base * 2.2,       // 0–2.2
    dodgePower: 1 + base * 3.5,   // 1–4.5

    targetX: null,
    targetY: null
};
}
// ---------------- UI ----------------
function openSettings(){
document.getElementById("menu").style.display="none";
document.getElementById("settings").style.display="flex";
}

function saveSettings(){
startBallCount = Number(document.getElementById("startBalls").value);
spawnDelay = Number(document.getElementById("spawnTime").value)*1000;
ballSpeedMultiplier = Number(document.getElementById("ballSpeed").value);
playerRadiusSetting = Number(document.getElementById("playerSize").value);
aiBotCount = Number(document.getElementById("botCount").value);
rankingMode =
document.getElementById("rankingMode").value;
document.getElementById("settings").style.display="none";
document.getElementById("menu").style.display="flex";
}
function createBallForMatch(match){

    const r = 15 + Math.random()*20;

    let x,y;
    let valid = false;

    while(!valid){

        x = Math.random()*(canvas.width - r*2) + r;
        y = Math.random()*(canvas.height - r*2) + r;

        valid = true;

        for(const p of match.players){

            if(!p.alive) continue;

            const dx = p.x - x;
            const dy = p.y - y;

            const dist = Math.sqrt(dx*dx + dy*dy);

            const minDistance =
                p.radius + r + 80;

            if(dist < minDistance){
                valid = false;
                break;
            }

        }

    }

    match.balls.push({

        x,
        y,
        radius:r,

        vx:(Math.random()*4+2)
            * ballSpeedMultiplier
            * (Math.random()<0.5?-1:1),

        vy:(Math.random()*4+2)
            * ballSpeedMultiplier
            * (Math.random()<0.5?-1:1)

    });

}
// ---------------- BALLS ----------------
function createBall(){

const r = 15 + Math.random()*20;

let x,y;
let valid = false;

while(!valid){

    x = Math.random()*(canvas.width - r*2) + r;
    y = Math.random()*(canvas.height - r*2) + r;

    valid = true;

    let safe = true;

    const allPlayers =
        mode === "tournament"
        ? matches[activeMatchIndex]?.alive || []
        : players;

    for(const p of allPlayers){

        const dx = p.x - x;
        const dy = p.y - y;

        const dist = Math.sqrt(dx*dx + dy*dy);

        const minDistance = p.radius + r + 80;

        if(dist < minDistance){
            safe = false;
            break;
        }
    }

    if(!safe){
        valid = false;
    }
}

balls.push({
x,y,
radius:r,
vx:(Math.random()*4+2)*ballSpeedMultiplier*(Math.random()<0.5?-1:1),
vy:(Math.random()*4+2)*ballSpeedMultiplier*(Math.random()<0.5?-1:1)
});

document.getElementById("balls").textContent = balls.length;
}

function tournamentSpawnLoop(){

    if(mode !== "tournament") return;

    spawnTimer = setTimeout(() => {

        if(mode === "tournament" && running){
            createBall();
            tournamentSpawnLoop();
        }

    }, spawnDelay);

}
function spawnLoop(){

    spawnTimer = setTimeout(() => {

        if(running){
            createBall();
            spawnLoop();
        }

    }, spawnDelay);

}
// ---------------- AI ----------------
function updateAI(p, activeBalls = balls){

    // ---------------- TARGET LOGIK ----------------
  let danger = false;

for(const b of activeBalls){
    const dx = p.x - b.x;
    const dy = p.y - b.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < p.awareness * 0.5){
        danger = true;
        break;
    }
}

// 👉 nur neue Ziele wenn KEINE Gefahr
if(!danger){

    if(
        p.targetX === null ||
        p.targetY === null ||
        Math.random() < 0.02
    ){
        p.targetX = Math.random() * canvas.width;
        p.targetY = Math.random() * canvas.height;
    }
}

    let moveX = p.targetX - p.x;
    let moveY = p.targetY - p.y;

    let moveDist = Math.sqrt(moveX*moveX + moveY*moveY) || 1;

    moveX /= moveDist;
    moveY /= moveDist;

    // ---------------- AVOIDANCE ----------------
    let avoidX = 0;
    let avoidY = 0;

    // Wände
    const wallMargin = 140;

    if(p.x < wallMargin){
        avoidX += (wallMargin - p.x) * 0.03;
    }
    if(p.x > canvas.width - wallMargin){
        avoidX -= (p.x - (canvas.width - wallMargin)) * 0.03;
    }
    if(p.y < wallMargin){
        avoidY += (wallMargin - p.y) * 0.03;
    }
    if(p.y > canvas.height - wallMargin){
        avoidY -= (p.y - (canvas.height - wallMargin)) * 0.03;
    }

    // ---------------- BALL AVOIDANCE (FIXED) ----------------
    for(const b of activeBalls){

        const dx = p.x - b.x;
        const dy = p.y - b.y;

        const dist = Math.sqrt(dx*dx + dy*dy) || 1;

        // 👉 FIX: weniger übertriebener Radius
        const safeRadius = p.awareness * 0.5;

        if(dist < safeRadius){

            const strength = (safeRadius - dist) / safeRadius;

            const force = strength * p.dodgePower;

            avoidX += (dx / dist) * force;
            avoidY += (dy / dist) * force;
        }
    }

    // ---------------- MOVEMENT MIX ----------------
    let vx =
        moveX * 4 +
        avoidX * 10;

    let vy =
        moveY * 4 +
        avoidY * 10;

    // kleine Unruhe
    vx += (Math.random() - 0.5) * p.randomness;
    vy += (Math.random() - 0.5) * p.randomness;

    // normalisieren
    let len = Math.sqrt(vx*vx + vy*vy) || 1;

    p.x += (vx / len) * p.speed;
    p.y += (vy / len) * p.speed;

    // ---------------- BOUNDS ----------------
    p.x = Math.max(p.radius, Math.min(canvas.width - p.radius, p.x));
    p.y = Math.max(p.radius, Math.min(canvas.height - p.radius, p.y));
}
function createMatch(p1,p2){

    return {

        id: crypto.randomUUID(),

        players: [p1,p2],

        balls: [],

        running: true,

        startTime: Date.now(),

        spawnTimer:null

    };

}
function resetAI(p){
    p.targetX = null;
    p.targetY = null;
}
function rememberMatch(p1, p2){

    if(!recentOpponents.has(p1.name)){
        recentOpponents.set(p1.name, []);
    }

    if(!recentOpponents.has(p2.name)){
        recentOpponents.set(p2.name, []);
    }

    recentOpponents.get(p1.name).push(p2.name);
    recentOpponents.get(p2.name).push(p1.name);

    const BLOCKED_OPPONENTS = 3;

    recentOpponents.get(p1.name).splice(
        0,
        Math.max(
            0,
            recentOpponents.get(p1.name).length
            - BLOCKED_OPPONENTS
        )
    );

    recentOpponents.get(p2.name).splice(
        0,
        Math.max(
            0,
            recentOpponents.get(p2.name).length
            - BLOCKED_OPPONENTS
        )
    );

}

else if(mode==="ai"){

function startTournament(){

    running = true;

    matches = [];
    participants = [];
    waitingQueue = [];

    // DU
    participants.push(
        createPlayer(
            canvas.width/2,
            canvas.height/2,
            "#00ff88",
            "DU"
        )
    );
balls = [];
players = [];
players = participants;
    // Bots
    for(let i=0;i<aiBotCount;i++){

       participants.push(
createPlayer(
    Math.random()*canvas.width,
    Math.random()*canvas.height,
    `hsl(${i*360/aiBotCount},100%,50%)`,
    "Bot "+(i+1)
)
);

    }

    // Alle warten auf Match
    waitingQueue.push(...participants);

    tryMatchmaking();

}
function tryMatchmaking(){

    if(waitingQueue.length < 2) return;

    const now = Date.now();

    // 1) Sortierung wie Lichess: zuerst Score, dann Elo
    waitingQueue.sort((a,b)=>{
        if((b.arenaScore ?? 0) !== (a.arenaScore ?? 0)){
            return (b.arenaScore ?? 0) - (a.arenaScore ?? 0);
        }
        return b.elo - a.elo;
    });

    const used = new Set();
    const newQueue = [];

    for(let i=0;i<waitingQueue.length;i++){

        const p1 = waitingQueue[i];
        if(used.has(p1.name)) continue;

        const recent = recentOpponents.get(p1.name) || [];

        let opponent = null;

        // 2) Lichess-style pairing: gleiche Score-Gruppe bevorzugen
        const p1Score = p1.arenaScore ?? 0;

        const candidates = waitingQueue.filter(p =>
            !used.has(p.name) &&
            p.name !== p1.name &&
            (p.arenaScore ?? 0) === p1Score
        );

        // 3) fallback: nahe Score-Gruppen
        const fallback = waitingQueue.filter(p =>
            !used.has(p.name) &&
            p.name !== p1.name &&
            Math.abs((p.arenaScore ?? 0) - p1Score) <= 1
        );

        const pool =
            candidates.length >= 1 ? candidates :
            fallback.length >= 1 ? fallback :
            waitingQueue;

        for(const p2 of pool){

            if(used.has(p2.name)) continue;

            // ❌ Rematch block (Lichess-like)
            if(recent.includes(p2.name)) continue;

            const last = rematchCooldown.get(p2.name) || 0;
            if(last + 15000 > now) continue;

            opponent = p2;
            break;
        }

        if(opponent){

            const match = createMatch(p1, opponent);
            setupMatch(match);

            matches.push(match);

            playerMatchMap.set(p1.name, match);
            playerMatchMap.set(opponent.name, match);

            used.add(p1.name);
            used.add(opponent.name);

            rememberMatch(p1, opponent);

        } else {
            newQueue.push(p1);
        }
    }

    waitingQueue = newQueue;

    // wenn noch Spieler übrig → nochmal versuchen
    if(waitingQueue.length >= 2){
        setTimeout(tryMatchmaking, 500);
    }
}
function setupMatch(match){
for(const p of match.players){
    p.alive = true;
    p.targetX = null;
    p.targetY = null;
}
    const p1 = match.players[0];
    const p2 = match.players[1];

    p1.alive = true;
    p2.alive = true;

    p1.x = canvas.width * 0.3;
    p1.y = canvas.height/2;

    p2.x = canvas.width * 0.7;
    p2.y = canvas.height/2;

    match.balls = [];

    for(let i=0;i<startBallCount;i++){
        createBallForMatch(match);
    }

    match.spawnTimer = setInterval(()=>{

        if(match.running){
            createBallForMatch(match);
        }

    }, spawnDelay);

}
// ---------------- SPAWN ----------------
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

function restartGame(){
if(spawnTimer) clearTimeout(spawnTimer);
const keepRound = currentRound;
startGame(mode);
currentRound = keepRound;
}

// ---------------- RECORD ----------------
function resetRecord(){
if(confirm("Rekord löschen?")){
record=0;
localStorage.setItem("fingerDodgeRecord",0);
document.getElementById("record").textContent=0;
}
}

// ---------------- GAME OVER ----------------
function gameOver(){
running=false;

let survived=Math.floor((Date.now()-startTime)/1000);

if(survived>record){
record=survived;
localStorage.setItem("fingerDodgeRecord",record);
document.getElementById("record").textContent=record;
}

document.getElementById("finalTime").textContent=survived;

// ---------------- UPDATE ----------------
function update(){
if(!running) return;
if(mode === "tournament"){
    updateTournament();
    return;
}
document.getElementById("time").textContent =
Math.floor((Date.now()-startTime)/1000);

// MOVEMENT
if(mode==="multi"){
if(keys["w"]) players[0].y-=5;
if(keys["s"]) players[0].y+=5;
if(keys["a"]) players[0].x-=5;
if(keys["d"]) players[0].x+=5;

if(keys["arrowup"]) players[1].y-=5;
if(keys["arrowdown"]) players[1].y+=5;
if(keys["arrowleft"]) players[1].x-=5;
if(keys["arrowright"]) players[1].x+=5;
}

if((mode==="ai" || mode==="single" || mode==="multi") && mode !== "tournament"){

for(const p of players){

if(p.alive && p.name !== HUMAN_NAME && p.name.startsWith("Bot")){
updateAI(p);
}

}

}
// bounds
for(const p of players){
p.x=Math.max(p.radius,Math.min(canvas.width-p.radius,p.x));
p.y=Math.max(p.radius,Math.min(canvas.height-p.radius,p.y));
}

// balls
for(const b of balls){
b.x+=b.vx;
b.y+=b.vy;

if(b.x-b.radius<0||b.x+b.radius>canvas.width)b.vx*=-1;
if(b.y-b.radius<0||b.y+b.radius>canvas.height)b.vy*=-1;
}

// collision
for(const p of players){
check(p);
}
}
function updateTournament(){

    for(const match of [...matches]){

        if(!match.running) continue;

        updateMatch(match);

    }

    updateEloTable();

}
function updateMatch(match){

    const players = match.players;

    // AI
 for(const p of players){
    if(p.alive && p.name !== HUMAN_NAME){
        updateAI(p, match.balls);
    }
}
    // BALLS
    for(const b of match.balls){

        b.x += b.vx;
        b.y += b.vy;

        if(b.x-b.radius<0||b.x+b.radius>canvas.width){
            b.vx *= -1;
        }

        if(b.y-b.radius<0||b.y+b.radius>canvas.height){
            b.vy *= -1;
        }

    }

    // COLLISION
    for(const p of players){

        if(!p.alive) continue;

        for(const b of match.balls){

            const dx = p.x - b.x;
            const dy = p.y - b.y;

            const dist =
                Math.sqrt(dx*dx + dy*dy);

            if(dist < p.radius + b.radius){

                p.alive = false;

                const alive =
                    players.filter(x=>x.alive);

                if(alive.length === 1){

                    finishMatch(
                        match,
                        alive[0],
                        p
                    );

                }

            }

        }

    }

}
// ---------------- COLLISION ----------------
function check(p){

if(!p.alive) return;

for(const b of balls){

const dx = p.x - b.x;
const dy = p.y - b.y;

const dist = Math.sqrt(dx*dx + dy*dy);

if(dist < p.radius + b.radius){

p.alive = false;
p.deathTime = Date.now();

eliminated.push(p);

const alive =
players.filter(x=>x.alive);

if(alive.length <= 1){

    if(alive.length === 1){
        alive[0].deathTime = Infinity;
        eliminated.push(alive[0]);
    }

    finishArena();
}
return;

}

}
}
function checkTournament(p,m){

if(!p.alive) return;

for(const b of balls){

const dx = p.x - b.x;
const dy = p.y - b.y;
const dist = Math.sqrt(dx*dx+dy*dy);

if(dist < p.radius + b.radius){

p.alive = false;
p.deathTime = Date.now();

m.alive = m.alive.filter(x=>x!==p);

if(m.alive.length === 1){
finishMatch(m);
}

return;
}
}
}
function finishMatch(match, winner, loser){

    clearInterval(match.spawnTimer);
    match.running = false;

    const now = Date.now();

    // 🔥 Rematch protection (Lichess style)
    rematchCooldown.set(winner.name, now);
    rematchCooldown.set(loser.name, now);

    const K = 24;

    const expected =
        1 / (1 + Math.pow(10, (loser.elo - winner.elo) / 400));

    const change = K * (1 - expected);

    winner.elo += change;
    loser.elo -= change;

    winner.lastChange = change;
    loser.lastChange = -change;

    winner.alive = true;
    loser.alive = true;

    // 🔥 Arena points (Lichess-like activity scoring)
    winner.arenaScore = (winner.arenaScore || 0) + 1;

    matches = matches.filter(m => m.id !== match.id);

    playerMatchMap.delete(winner.name);
    playerMatchMap.delete(loser.name);

    const nextMatchDelay = 2500 + Math.random() * 1500;

    setTimeout(() => {

        resetAI(winner);
        resetAI(loser);

        waitingQueue.push(winner);
        waitingQueue.push(loser);

        tryMatchmaking();

    }, nextMatchDelay);
}
function finishArena(){

// NICHT stoppen im Turnier
if(mode !== "tournament"){
    running = false;
}

if(spawnTimer){
clearTimeout(spawnTimer);
}

eliminated.sort(
(a,b)=>b.deathTime-a.deathTime
);

if(rankingMode==="points"){

const totalPlayers = eliminated.length;

for(let i=0;i<eliminated.length;i++){

const p = eliminated[i];

const rankPlayer =
ranking.find(x=>x.name===p.name);

const gainedPoints =
totalPlayers - i;

if(rankPlayer){

rankPlayer.points += gainedPoints;

}else{

ranking.push({
name:p.name,
color:p.color,
points:gainedPoints,
elo:1500,
lastChange:0
});

}

}

}else{

const K = 24;

for(const bot of ranking){
bot.lastChange = 0;
}

for(let i=0;i<eliminated.length;i++){

for(let j=i+1;j<eliminated.length;j++){

let a =
ranking.find(
x=>x.name===eliminated[i].name
);

if(!a){

a = {
name:eliminated[i].name,
color:eliminated[i].color,
points:0,
elo:1500,
lastChange:0
};

ranking.push(a);
}

let b =
ranking.find(
x=>x.name===eliminated[j].name
);

if(!b){

b = {
name:eliminated[j].name,
color:eliminated[j].color,
points:0,
elo:1500,
lastChange:0
};

ranking.push(b);
}

const expectedA =
1/(1+Math.pow(10,(b.elo-a.elo)/400));

const expectedB =
1-expectedA;

const changeA =
K*(1-expectedA);

const changeB =
K*(0-expectedB);

a.elo += changeA;
b.elo += changeB;

a.lastChange += changeA;
b.lastChange += changeB;

}

}

}

updateRanking();

const winner = eliminated[0];

document.getElementById("gameOver").style.display =
"flex";

document.getElementById("finalTime").innerHTML =
"Runde "
+ currentRound
+ "/"
+ tournamentRounds
+ "<br>Sieger: "
+ winner.name;

if(currentRound < tournamentRounds){

currentRound++;

setTimeout(()=>{

document.getElementById("gameOver").style.display =
"none";

startGame(mode);

},15000);

}else{

document.getElementById("finalTime").innerHTML +=
"<br><br><b>TURNIER BEENDET</b>";

}

}

function updateRanking(){

let sorted;

if(rankingMode==="elo"){

sorted =
[...ranking].sort(
(a,b)=>b.elo-a.elo
);

}else{

sorted =
[...ranking].sort(
(a,b)=>b.points-a.points
);

}

let html =
"<b>TURNIER RANKING</b><br><br>";

for(let i=0;i<sorted.length;i++){

if(rankingMode==="elo"){

html +=
(i+1)+". "
+sorted[i].name
+" | "
+Math.round(sorted[i].elo)
+" ELO "
+"("
+(sorted[i].lastChange>=0?"+":"")
+Math.round(sorted[i].lastChange)
+")<br>";

}else{

html +=
(i+1)+". "
+sorted[i].name
+" | "
+sorted[i].points
+" Punkte<br>";

}

}

document.getElementById("ranking").innerHTML =
html;
}
function updateMultiplayerRanking(){

let html =
"<b>Multiplayer Ranking</b><br><br>";

html +=
"1. Spieler 1 - "
+ multiplayerScores[0].points
+ " Punkte<br>";

html +=
"2. Spieler 2 - "
+ multiplayerScores[1].points
+ " Punkte<br>";

document.getElementById("ranking").innerHTML =
html;

}
function updateEloTable(){

    let sorted =
        [...participants]
        .sort((a,b)=>b.elo-a.elo);

    let html = "";

    for(let i=0;i<sorted.length;i++){

        const p = sorted[i];

        const active =
            isPlayerInMatch(p);

        const statusColor =
            active ? "lime" : "red";

        html += `
        <div style="
            display:flex;
            align-items:center;
            gap:8px;
            margin-bottom:8px;
        ">

            <div style="
                width:12px;
                height:12px;
                border-radius:50%;
                background:${statusColor};
                flex-shrink:0;
            "></div>

            <div>
                ${i+1}. ${p.name}<br>

                ${Math.round(p.elo)}

                <span style="
                    color:${
                        p.lastChange >= 0
                        ? 'lime'
                        : 'red'
                    }
                ">
                (
                    ${p.lastChange >= 0 ? '+' : ''}
                    ${Math.round(p.lastChange)}
                )
                </span>

            </div>

        </div>
        `;
    }

    document.getElementById("eloList").innerHTML =
        html;
}
function isPlayerInMatch(player){

    return matches.some(match =>
        match.running &&
        match.players.includes(player)
    );

}
// ---------------- DRAW ----------------
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

  if(mode === "tournament"){

    const myMatch =
        playerMatchMap.get("DU");

    if(myMatch && myMatch.running){

        for(const b of myMatch.balls){

            ctx.beginPath();
            ctx.arc(
                b.x,
                b.y,
                b.radius,
                0,
                Math.PI*2
            );

            ctx.fillStyle = "#ff4444";
            ctx.fill();

        }

    }

}else{
    for(const b of balls){

        ctx.beginPath();
        ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
        ctx.fillStyle="#ff4444";
        ctx.fill();

    }

}

    // 🔥 FIX: Tournament benutzt alive statt players
 let render = players;

if(mode === "tournament"){

    const myMatch =
        playerMatchMap.get("DU");

    render =
        myMatch
        ? myMatch.players
        : [];

}
    for(const p of render){

        if(!p.alive) continue;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();

        ctx.fillStyle="white";
        ctx.font="14px Arial";
        ctx.textAlign="center";

        ctx.fillText(p.name, p.x, p.y - p.radius - 10);
    }
}
// ---------------- SINGLE CONTROL ----------------
function moveSingle(x,y){

   if(mode === "tournament"){

    const match =
        playerMatchMap.get("DU");

    if(!match) return;

    const me =
        match.players.find(
            p => p.name === "DU"
        );

    if(!me) return;

    me.x = x;
    me.y = y;

    return;
}

    if(players[0]){
        players[0].x = x;
        players[0].y = y;
    }
}
canvas.addEventListener("mousemove",(e)=>{
    if(running && (mode==="single" || mode==="tournament")){
        moveSingle(e.clientX,e.clientY);
    }
});

canvas.addEventListener("touchmove",(e)=>{
    if(running && (mode==="single" || mode==="tournament")){
        moveSingle(
            e.touches[0].clientX,
            e.touches[0].clientY
        );
    }
});
loop();
