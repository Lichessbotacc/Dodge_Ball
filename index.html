<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finger Dodge</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#111;font-family:Arial,sans-serif;}
canvas{display:block;touch-action:none;}

#ui{
    position:absolute;top:20px;left:20px;color:white;
    font-size:20px;font-weight:bold;
}

#menu{
    position:absolute;inset:0;display:flex;
    flex-direction:column;justify-content:center;
    align-items:center;background:#111;color:white;
}

h1{font-size:50px;margin-bottom:20px;}

button{
    padding:15px 35px;font-size:22px;
    border:none;border-radius:12px;cursor:pointer;
    margin:10px;
}

#gameOver{
    position:absolute;inset:0;background:rgba(0,0,0,0.8);
    display:none;flex-direction:column;
    justify-content:center;align-items:center;color:white;
}

#settings{
display:none;
position:absolute;
inset:0;
background:#111;
color:white;
flex-direction:column;
justify-content:center;
align-items:center;
}
</style>
</head>

<body>

<div id="ui">
Zeit: <span id="time">0</span>s<br>
Rekord: <span id="record">0</span>s<br>
Bälle: <span id="balls">0</span><br>
Modus: <span id="mode">-</span>
</div>
<div id="eloTable" style="
position:absolute;
top:20px;
right:20px;
background:rgba(0,0,0,0.6);
padding:10px;
color:white;
min-width:180px;
">
<b>ELO LIVE</b>
<div id="eloList"></div>
</div>
<div id="menu">
<h1>Finger Dodge</h1>
<button onclick="startGame('single')">Singleplayer</button>
<button onclick="startGame('multi')">Multiplayer (lokal)</button>
<button onclick="startGame('ai')">AI Spectate</button>
<button onclick="startGame('tournament')">1vs1 Tournament </button>
<button onclick="openSettings()">Settings</button>
<button onclick="resetRecord()">Rekord zurücksetzen</button>
</div>

<div id="settings">
<h2>Settings</h2>

<label>Start-Bälle</label>
<input id="startBalls" type="number" value="3" min="1" max="20">

<br><br>

<label>Spawn-Zeit</label>
<input id="spawnTime" type="number" value="5" min="1" max="30">

<br><br>

<label>Ball-Speed</label>
<select id="ballSpeed">
<option value="0.5">Langsam</option>
<option value="1" selected>Normal</option>
<option value="1.5">Schnell</option>
<option value="2">Extrem</option>
</select>

<br><br>
<label>AI Bots</label>
<input id="botCount" type="number" value="10" min="2">
<br><br>

<label>Ranking-System</label>
<select id="rankingMode">
<option value="points" selected>Punkte</option>
<option value="elo">ELO</option>
</select>
<br><br>
<label>Spielergröße</label>
<input id="playerSize" type="number" value="18" min="5" max="50">

<br><br>

<button onclick="saveSettings()">Speichern</button>
</div>

<div id="gameOver">
<h2>GAME OVER</h2>
<p>Überlebt: <span id="finalTime">0</span>s</p>
<button onclick="restartGame()">Nochmal</button>
<div id="ranking" style="
position:absolute;
top:20px;
right:20px;
color:white;
font-size:18px;
text-align:left;
max-height:90vh;
overflow:auto;
">
</div>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ---------------- STATE ----------------
let balls = [];
let players = [];
let ranking = [];
let multiplayerScores = [
{name:"Spieler 1",points:0},
{name:"Spieler 2",points:0}
];
let eliminated = [];
let running = false;
let startTime = 0;
let spawnTimer = null;
let mode = "single";
let tournamentRounds = 100;
let currentRound = 1;
let roundFinished = false;
let startBallCount = 3;
let spawnDelay = 5000;
let ballSpeedMultiplier = 1;
let playerRadiusSetting = 18;
let aiBotCount = 10;
let rankingMode = "points";
let participants = [];
let matches = [];
let activeMatchIndex = 0;
let tournamentRunning = false;
let spawnActive = false;
// ---------------- RECORD ----------------
let record = localStorage.getItem("fingerDodgeRecord") || 0;
document.getElementById("record").textContent = record;

// ---------------- PLAYER FACTORY ----------------
function createPlayer(x,y,color,name,skill=null){

skill = skill ?? Math.random();

return {
x,
y,
radius:playerRadiusSetting,
color,
name,
points:0,
elo:1500,
lastChange:0,
alive:true,
games:0,

// BASIS SKILL
skill,

// 🔥 individuelle Eigenschaften
speed: 1 + Math.random()*7,
reaction: 0.3 + Math.random()*1.7,
awareness: 80 + Math.random()*260,
randomness: Math.random()*4,
dodgePower: 0.5 + Math.random()*2.5,

targetX:null,
targetY:null
};

}
// ---------------- UI ----------------
function openSettings(){
document.getElementById("menu").style.display="none";
document.getElementById("settings").style.display="flex";
}

function saveSettings(){
startBallCount = Number(document.getElementById("startBalls").value);
spawnDelay = Number(document.getElementById("spawnTime").value)*1000;
ballSpeedMultiplier = Number(document.getElementById("ballSpeed").value);
playerRadiusSetting = Number(document.getElementById("playerSize").value);
aiBotCount = Number(document.getElementById("botCount").value);
rankingMode =
document.getElementById("rankingMode").value;
document.getElementById("settings").style.display="none";
document.getElementById("menu").style.display="flex";
}

// ---------------- BALLS ----------------
function createBall(){

const r = 15 + Math.random()*20;

let x,y;
let valid = false;

while(!valid){

    x = Math.random()*(canvas.width - r*2) + r;
    y = Math.random()*(canvas.height - r*2) + r;

    valid = true;

    let safe = true;

    const allPlayers =
        mode === "tournament"
        ? matches[activeMatchIndex]?.alive || []
        : players;

    for(const p of allPlayers){

        const dx = p.x - x;
        const dy = p.y - y;

        const dist = Math.sqrt(dx*dx + dy*dy);

        const minDistance = p.radius + r + 80;

        if(dist < minDistance){
            safe = false;
            break;
        }
    }

    if(!safe){
        valid = false;
    }
}

balls.push({
x,y,
radius:r,
vx:(Math.random()*4+2)*ballSpeedMultiplier*(Math.random()<0.5?-1:1),
vy:(Math.random()*4+2)*ballSpeedMultiplier*(Math.random()<0.5?-1:1)
});

document.getElementById("balls").textContent = balls.length;
}

function tournamentSpawnLoop(){

    if(mode !== "tournament") return;

    spawnTimer = setTimeout(() => {

        if(mode === "tournament" && running){
            createBall();
            tournamentSpawnLoop();
        }

    }, spawnDelay);

}
function spawnLoop(){

    spawnTimer = setTimeout(() => {

        if(running){
            createBall();
            spawnLoop();
        }

    }, spawnDelay);

}
// ---------------- AI ----------------
function updateAI(p){

// Ziel wechseln
if(
!p.targetX ||
!p.targetY ||
Math.random() < 0.01 * p.reaction
){
p.targetX = Math.random() * canvas.width;
p.targetY = Math.random() * canvas.height;
}

// Richtung Ziel
let moveX = p.targetX - p.x;
let moveY = p.targetY - p.y;

let moveDist =
Math.sqrt(moveX*moveX + moveY*moveY) || 1;

moveX /= moveDist;
moveY /= moveDist;

// Avoidance
let avoidX = 0;
let avoidY = 0;
// 🔥 Wände vermeiden
const wallMargin = 140;

if(p.x < wallMargin){
avoidX += (wallMargin - p.x) * 0.03;
}

if(p.x > canvas.width - wallMargin){
avoidX -= (p.x - (canvas.width - wallMargin)) * 0.03;
}

if(p.y < wallMargin){
avoidY += (wallMargin - p.y) * 0.03;
}

if(p.y > canvas.height - wallMargin){
avoidY -= (p.y - (canvas.height - wallMargin)) * 0.03;
}
for(const b of balls){

const dx = p.x - b.x;
const dy = p.y - b.y;

const dist =
Math.sqrt(dx*dx + dy*dy) || 1;

const safeRadius = p.awareness;

if(dist < safeRadius){

const strength =
(safeRadius / dist);

const force =
Math.min(
strength * p.dodgePower,
10
);

avoidX += (dx / dist) * force;
avoidY += (dy / dist) * force;

}

}

// Mischung
let vx =
moveX * 3 +
avoidX * 20;

let vy =
moveY * 3 +
avoidY * 20;

// Random Verhalten
vx += (Math.random()-0.5) * p.randomness;
vy += (Math.random()-0.5) * p.randomness;

// Geschwindigkeit
let len =
Math.sqrt(vx*vx + vy*vy) || 1;

p.x += (vx/len) * p.speed;
p.y += (vy/len) * p.speed;

// Grenzen
p.x = Math.max(
p.radius,
Math.min(canvas.width-p.radius,p.x)
);

p.y = Math.max(
p.radius,
Math.min(canvas.height-p.radius,p.y)
);

}
// ---------------- START ----------------
function startGame(selectedMode){

mode = selectedMode;

document.getElementById("eloTable").style.display =
(mode === "tournament") ? "block" : "none";
document.getElementById("mode").textContent = mode;
document.getElementById("menu").style.display = "none";
document.getElementById("gameOver").style.display = "none";

balls = [];
players = [];
eliminated = [];

running = true;
startTime = Date.now();

if(mode !== "multi"){

if(ranking.length === 0){

for(let i=0;i<aiBotCount;i++){

ranking.push(
createPlayer(
0,
0,
`hsl(${i*360/aiBotCount},100%,50%)`,
"Bot "+(i+1)
)
);

}

}

}
if(mode === "single"){

const existingPlayer =
ranking.find(x => x.name === "Spieler");

if(!existingPlayer){

ranking.push({
name:"Spieler",
color:"#00ff88",
points:0,
elo:1500,
lastChange:0
});

}

}
if(mode==="single"){

players.push(
createPlayer(
canvas.width/2,
canvas.height/2,
"#00ff88",
"Spieler"
)
);

for(const bot of ranking){

if(bot.name === "Spieler") continue;

players.push({
...bot,
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
radius:playerRadiusSetting,
alive:true,

// 🔥 eigener Skill
skill: bot.skill ?? Math.random()
});
}

}

else if(mode==="multi"){

players.push(
createPlayer(200,200,"#00ff88","Spieler 1"),
createPlayer(400,200,"#4488ff","Spieler 2")
);

for(let i=0;i<aiBotCount;i++){

players.push(
createPlayer(
Math.random()*canvas.width,
Math.random()*canvas.height,
`hsl(${i*360/aiBotCount},100%,50%)`,
"Bot "+(i+1),
Math.random()
)
);

}

}
if(mode === "tournament"){
    startTournament();
    return;
}

else if(mode==="ai"){

for(const bot of ranking){

players.push({
...bot,
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
radius:playerRadiusSetting,
alive:true,
skill: bot.skill ?? Math.random()
});

}

}

for(let i=0;i<startBallCount;i++){
createBall();
}

spawnLoop();
updateRanking();
}
function startTournament(){
    running = true;

    balls = [];
    players = [];
    matches = [];
    participants = [];
    activeMatchIndex = 0;

    // Spieler + Bots erstellen
    participants.push(createPlayer(
        canvas.width/2,
        canvas.height/2,
        "#00ff88",
        "DU"
    ));

    for(let i=0;i<aiBotCount;i++){

    const skill = Math.random(); // nur Tournament

    participants.push({
        ...createPlayer(
            Math.random()*canvas.width,
            Math.random()*canvas.height,
            `hsl(${i*360/aiBotCount},100%,50%)`,
            "Bot "+(i+1)
        ),
        skill,
        isTournamentBot: true
    });
}
    // Shuffle
    participants.sort((a,b)=>b.elo-a.elo);

    // Matches bauen (1vs1)
    for(let i=0;i<participants.length;i+=2){
        if(!participants[i+1]) break;

        matches.push({
            p1: participants[i],
            p2: participants[i+1],
            alive: [],
            finished:false
        });
    }

    activeMatchIndex = 0;
startMatch(activeMatchIndex);
}
function startMatch(i){
    const m = matches[i];
    if(!m) return;

    balls = [];

    // Spieler reset
    m.alive = [m.p1, m.p2];
    m.p1.alive = true;
    m.p2.alive = true;

    m.p1.x = canvas.width * 0.3;
    m.p1.y = canvas.height / 2;

    m.p2.x = canvas.width * 0.7;
    m.p2.y = canvas.height / 2;

    // WICHTIG: Timer reset
    startTime = Date.now();
    // Start Bälle
for(let i=0;i<startBallCount;i++){
    createBall();
}

// 👉 DAS HINZUFÜGEN:
if (spawnTimer) clearTimeout(spawnTimer);
tournamentSpawnLoop();

}
// ---------------- SPAWN ----------------
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

// ---------------- RESTART ----------------
function restartGame(){
if(spawnTimer) clearTimeout(spawnTimer);
const keepRound = currentRound;
startGame(mode);
currentRound = keepRound;
}

// ---------------- RECORD ----------------
function resetRecord(){
if(confirm("Rekord löschen?")){
record=0;
localStorage.setItem("fingerDodgeRecord",0);
document.getElementById("record").textContent=0;
}
}

// ---------------- GAME OVER ----------------
function gameOver(){
running=false;

let survived=Math.floor((Date.now()-startTime)/1000);

if(survived>record){
record=survived;
localStorage.setItem("fingerDodgeRecord",record);
document.getElementById("record").textContent=record;
}

document.getElementById("finalTime").textContent=survived;
document.getElementById("gameOver").style.display="flex";
}

// ---------------- UPDATE ----------------
function update(){
if(!running) return;
if(mode === "tournament"){
    updateTournament();
    return;
}
document.getElementById("time").textContent =
Math.floor((Date.now()-startTime)/1000);

// MOVEMENT
if(mode==="multi"){
if(keys["w"]) players[0].y-=5;
if(keys["s"]) players[0].y+=5;
if(keys["a"]) players[0].x-=5;
if(keys["d"]) players[0].x+=5;

if(keys["arrowup"]) players[1].y-=5;
if(keys["arrowdown"]) players[1].y+=5;
if(keys["arrowleft"]) players[1].x-=5;
if(keys["arrowright"]) players[1].x+=5;
}

if(mode==="ai" || mode==="single" || mode==="multi"){

for(const p of players){

if(
p.alive &&
(
p.name.startsWith("Bot")
)
){
updateAI(p);
}

}

}
// bounds
for(const p of players){
p.x=Math.max(p.radius,Math.min(canvas.width-p.radius,p.x));
p.y=Math.max(p.radius,Math.min(canvas.height-p.radius,p.y));
}

// balls
for(const b of balls){
b.x+=b.vx;
b.y+=b.vy;

if(b.x-b.radius<0||b.x+b.radius>canvas.width)b.vx*=-1;
if(b.y-b.radius<0||b.y+b.radius>canvas.height)b.vy*=-1;
}

// collision
for(const p of players){
check(p);
}
}
function updateTournament(){
    const m = matches[activeMatchIndex];
    if(!m) return;

    // AI bewegen
    for(const p of m.alive){
        if(p.name.startsWith("Bot")){
            updateAI(p);
        }
    }

    // Bälle bewegen
    for(const b of balls){
        b.x += b.vx;
        b.y += b.vy;

        if(b.x-b.radius<0||b.x+b.radius>canvas.width) b.vx *= -1;
        if(b.y-b.radius<0||b.y+b.radius>canvas.height) b.vy *= -1;
    }

    // Collision
    for(const p of m.alive){
        checkTournament(p,m);
    }

    // Timer UI
    document.getElementById("time").textContent =
        Math.floor((Date.now()-startTime)/1000);
    updateEloTable();
}
// ---------------- COLLISION ----------------
function check(p){

if(!p.alive) return;

for(const b of balls){

const dx = p.x - b.x;
const dy = p.y - b.y;

const dist = Math.sqrt(dx*dx + dy*dy);

if(dist < p.radius + b.radius){

p.alive = false;
p.deathTime = Date.now();

eliminated.push(p);

const alive =
players.filter(x=>x.alive);

if(alive.length <= 1){

    if(alive.length === 1){
        alive[0].deathTime = Infinity;
        eliminated.push(alive[0]);
    }

    finishArena();
}
return;

}

}
}
function checkTournament(p,m){

if(!p.alive) return;

for(const b of balls){

const dx = p.x - b.x;
const dy = p.y - b.y;
const dist = Math.sqrt(dx*dx+dy*dy);

if(dist < p.radius + b.radius){

p.alive = false;
p.deathTime = Date.now();

m.alive = m.alive.filter(x=>x!==p);

if(m.alive.length === 1){
finishMatch(m);
}

return;
}
}
}
function finishMatch(m){

m.finished = true;

const winner = m.alive[0];
const loser = (winner === m.p1) ? m.p2 : m.p1;

function getKFactor(){
    let round = currentRound;

    if(round <= 3){
        return 80;   // 🔥 extrem hohe Sprünge
    }
    else if(round <= 8){
        return 30;   // mittel
    }
    else{
        return 10;   // stabil
    }
}
const K =
(
getKFactor(winner)
+
getKFactor(loser)
) / 2;

const expected =
1/(1+Math.pow(10,(loser.elo - winner.elo)/400));

const change =
Math.max(
0.5,
K * (1 - expected)
);

winner.elo += change;
loser.elo -= change;

winner.lastChange = change;
loser.lastChange = -change;
winner.games++;
loser.games++;
// nächstes Match
activeMatchIndex++;



if(activeMatchIndex < matches.length){

    setTimeout(()=>{
        startMatch(activeMatchIndex);
    }, 2000);

}else{

    // Turnierrunde fertig → neue Paarungen bauen

    setTimeout(()=>{

        participants.sort((a,b)=>b.elo-a.elo);

matches = [];
activeMatchIndex = 0;

for(let i=0;i<participants.length;i+=2){

    if(!participants[i+1]) continue;

    matches.push({
        p1: participants[i],
        p2: participants[i+1],
        alive: [],
        finished:false
    });

}

if(matches.length > 0){
    startMatch(0);
}

    }, 2000);
}
}
function finishArena(){

    // Spiel stoppen
    if(mode !== "tournament"){
        running = false;
    }

    // Spawn stoppen
    if(spawnTimer){
        clearTimeout(spawnTimer);
    }

    // Ranking nach Überlebenszeit
    eliminated.sort(
        (a,b)=>b.deathTime-a.deathTime
    );

    // Sieger markieren
    const winner = eliminated[0];

    // ---------------- POINT SYSTEM ----------------
    if(rankingMode === "points"){

        const totalPlayers = eliminated.length;

        for(let i=0;i<eliminated.length;i++){

            const p = eliminated[i];

            let rankPlayer =
                ranking.find(x=>x.name===p.name);

            const gainedPoints =
                totalPlayers - i;

            if(rankPlayer){

                rankPlayer.points += gainedPoints;

            }else{

                ranking.push({
                    name:p.name,
                    color:p.color,
                    points:gainedPoints,
                    elo:1500,
                    lastChange:0
                });

            }

        }

    }

    // ---------------- ELO SYSTEM ----------------
    else{

        // Anzeige reset
        for(const bot of ranking){
            bot.lastChange = 0;
        }

        // Dynamisches K
        const K =
            Math.max(
                1,
                16 / eliminated.length
            );

        // Alle Spieler absichern
        for(const p of eliminated){

            let existing =
                ranking.find(x=>x.name===p.name);

            if(!existing){

                ranking.push({
                    name:p.name,
                    color:p.color,
                    points:0,
                    elo:1500,
                    lastChange:0
                });

            }

        }

        // Jeder gegen jeden
        for(let i=0;i<eliminated.length;i++){

            for(let j=i+1;j<eliminated.length;j++){

                const winnerData = eliminated[i];
                const loserData = eliminated[j];

                const winnerPlayer =
                    ranking.find(
                        x=>x.name===winnerData.name
                    );

                const loserPlayer =
                    ranking.find(
                        x=>x.name===loserData.name
                    );

                // Expected
                const expectedWinner =
                    1/(1+Math.pow(
                        10,
                        (loserPlayer.elo-winnerPlayer.elo)/400
                    ));

                const expectedLoser =
                    1 - expectedWinner;

                // Änderungen
                const winnerChange =
                    K * (1 - expectedWinner);

                const loserChange =
                    K * (0 - expectedLoser);

                // Anwenden
                winnerPlayer.elo += winnerChange;
                loserPlayer.elo += loserChange;

                winnerPlayer.lastChange += winnerChange;
                loserPlayer.lastChange += loserChange;

            }

        }

    }

    // ---------------- UI UPDATE ----------------

    updateRanking();

    document.getElementById("gameOver").style.display =
        "flex";

    // Tournament Anzeige
    if(mode === "tournament"){

        document.getElementById("finalTime").innerHTML =
            "Runde "
            + currentRound
            + "/"
            + tournamentRounds
            + "<br>Sieger: "
            + winner.name;

        if(currentRound < tournamentRounds){

            currentRound++;

            setTimeout(()=>{

                document.getElementById("gameOver").style.display =
                    "none";

                startGame(mode);

            }, 5000);

        }else{

            document.getElementById("finalTime").innerHTML +=
                "<br><br><b>TURNIER BEENDET</b>";

        }

    }

    // Normale Modi
    else{

        const survived =
            Math.floor(
                (Date.now()-startTime)/1000
            );

        // Rekord
        if(survived > record){

            record = survived;

            localStorage.setItem(
                "fingerDodgeRecord",
                record
            );

            document.getElementById("record").textContent =
                record;
        }

        document.getElementById("finalTime").innerHTML =
            "Überlebt: "
            + survived
            + "s<br><br>"
            + "Sieger: "
            + winner.name;

    }

}

function updateRanking(){

let sorted;

if(rankingMode==="elo"){

sorted =
[...ranking].sort(
(a,b)=>b.elo-a.elo
);

}else{

sorted =
[...ranking].sort(
(a,b)=>b.points-a.points
);

}

let html =
"<b>TURNIER RANKING</b><br><br>";

for(let i=0;i<sorted.length;i++){

if(rankingMode==="elo"){

html +=
(i+1)+". "
+sorted[i].name
+" | "
+Math.round(sorted[i].elo)
+" ELO "
+"("
+(sorted[i].lastChange>=0?"+":"")
+Math.round(sorted[i].lastChange)
+")<br>";

}else{

html +=
(i+1)+". "
+sorted[i].name
+" | "
+sorted[i].points
+" Punkte<br>";

}

}

document.getElementById("ranking").innerHTML =
html;
}

function updateEloTable(){

let sorted = [...participants].sort((a,b)=>b.elo-a.elo);

for(let i=0;i<sorted.length;i++){

html += `
<div>
${i+1}. ${sorted[i].name}<br>

// ---------------- DRAW ----------------
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(const b of balls){
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
        ctx.fillStyle="#ff4444";
        ctx.fill();
    }

    // 🔥 FIX: Tournament benutzt alive statt players
    const render =
        mode === "tournament"
        ? (matches[activeMatchIndex]?.alive || [])
        : players;

    for(const p of render){

        if(!p.alive) continue;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();

        ctx.fillStyle="white";
        ctx.font="14px Arial";
        ctx.textAlign="center";

        ctx.fillText(p.name, p.x, p.y - p.radius - 10);
    }
}
// ---------------- SINGLE CONTROL ----------------
function moveSingle(x,y){

    if(mode === "tournament"){

        const m = matches[activeMatchIndex];
        if(!m) return;

        if(m.p1.name === "DU"){
            m.p1.x = x;
            m.p1.y = y;
            return;
        }

        if(m.p2.name === "DU"){
            m.p2.x = x;
            m.p2.y = y;
            return;
        }

        return;
    }

    if(players[0]){
        players[0].x = x;
        players[0].y = y;
    }
}
canvas.addEventListener("mousemove",(e)=>{
    if(running && (mode==="single" || mode==="tournament")){
        moveSingle(e.clientX,e.clientY);
    }
});

canvas.addEventListener("touchmove",(e)=>{
    if(running && (mode==="single" || mode==="tournament")){
        moveSingle(
            e.touches[0].clientX,
            e.touches[0].clientY
        );
    }
});
loop();
</script>
