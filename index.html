// PLAYER FACTORY - SMOOTH RANDOM SKILLS
function createPlayer(x, y, color, name){
    // Completely random skill from 0 to 1 (smooth, not tiered)
    const skill = Math.random();

    return {
        x,
        y,
        radius: playerRadiusSetting,
        color,
        name,
        points: 0,
        elo: 1500,
        lastChange: 0,
        alive: true,
        games: 0,

        skill: skill,

        // Smooth scaling based on skill
       speed: 1.5 + skill * 8,
        reaction: 0.3 + skill * 4,
        awareness: 50 + skill * 95,
        randomness: (1 - skill) * 5,
        dodgePower: 0.3 + skill * 4,

        targetX: null,
        targetY: null,
        
        lastVX: 0,
        lastVY: 0
    };
}

function createBallForMatch(match){
    const r = 15 + Math.random()*20;
    let x,y;
    let valid = false;

    while(!valid){
        x = Math.random()*(canvas.width - r*2) + r;
        y = Math.random()*(canvas.height - r*2) + r;
        valid = true;

        for(const p of match.players){
            if(!p.alive) continue;
            const dx = p.x - x;
            const dy = p.y - y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const minDistance = p.radius + r + 80;

            if(dist < minDistance){
                valid = false;
                break;
            }
        }
    }

    const baseSpeed = 5 + Math.random() * 6;

    const angle = Math.random() * Math.PI * 2;

match.balls.push({
    x,
    y,
    radius:r,
    vx: Math.cos(angle) * baseSpeed * ballSpeedMultiplier,
    vy: Math.sin(angle) * baseSpeed * ballSpeedMultiplier
});
}
// BALLS
function createBall(){
    const r = 15 + Math.random()*20;
    let x,y;
    let valid = false;

    while(!valid){
        x = Math.random()*(canvas.width - r*2) + r;
        y = Math.random()*(canvas.height - r*2) + r;
        valid = true;

        let safe = true;
        const allPlayers = players;

        for(const p of allPlayers){
            const dx = p.x - x;
            const dy = p.y - y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const minDistance = p.radius + r + 80;

            if(dist < minDistance){
                safe = false;
                break;
            }
        }

        if(!safe){
            valid = false;
        }
    }

    const baseSpeed = 5 + Math.random() * 6;

    const angle = Math.random() * Math.PI * 2;

balls.push({
    x,
    y,
    radius:r,
    vx: Math.cos(angle) * baseSpeed * ballSpeedMultiplier,
    vy: Math.sin(angle) * baseSpeed * ballSpeedMultiplier
});
}

function spawnLoop(){
    spawnTimer = setTimeout(() => {
        if(running){
            createBall();
            spawnLoop();
        }
    }, spawnDelay);
}

// AI - ONLY DODGE BALLS
function updateAI(p, activeBalls = balls){
    let danger = false;

    // Only detect danger from balls
    for(const b of activeBalls){
        const dx = p.x - b.x;
        const dy = p.y - b.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < p.awareness){
            danger = true;
            break;
        }
    }

    if(!danger){
        if(p.targetX === null || p.targetY === null || Math.random() < 0.02){
            p.targetX = Math.random() * canvas.width;
            p.targetY = Math.random() * canvas.height;
        }
    }

    let moveX = p.targetX - p.x;
    let moveY = p.targetY - p.y;
    let moveDist = Math.sqrt(moveX*moveX + moveY*moveY) || 1;

    moveX /= moveDist;
    moveY /= moveDist;

    let avoidX = 0;
    let avoidY = 0;

    const wallMargin = 140;

    if(p.x < wallMargin){
        avoidX += (wallMargin - p.x) * 0.03;
    }
    if(p.x > canvas.width - wallMargin){
        avoidX -= (p.x - (canvas.width - wallMargin)) * 0.03;
    }
    if(p.y < wallMargin){
        avoidY += (wallMargin - p.y) * 0.03;
    }
    if(p.y > canvas.height - wallMargin){
        avoidY -= (p.y - (canvas.height - wallMargin)) * 0.03;
    }

    // ONLY BALL AVOIDANCE
    for(const b of activeBalls){
        const dx = p.x - b.x;
        const dy = p.y - b.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;

        const safeRadius = p.awareness;

        if(dist < safeRadius){
            const strength = Math.max(0, (safeRadius - dist) / safeRadius);
            const force = strength * p.dodgePower * 2;

            avoidX += (dx / dist) * force;
            avoidY += (dy / dist) * force;
        }
    }

    let vx = moveX * 4 + avoidX * 10;
    let vy = moveY * 4 + avoidY * 10;

    vx += (Math.random() - 0.5) * p.randomness;
    vy += (Math.random() - 0.5) * p.randomness;

    let len = Math.sqrt(vx*vx + vy*vy) || 1;

    p.x += (vx / len) * p.speed;
    p.y += (vy / len) * p.speed;

    p.x = Math.max(p.radius, Math.min(canvas.width - p.radius, p.x));
    p.y = Math.max(p.radius, Math.min(canvas.height - p.radius, p.y));
    p.lastVX = vx;
    p.lastVY = vy;
}

function createMatch(p1,p2){
    return {
        id: crypto.randomUUID(),
        players: [p1,p2],
        balls: [],
        running: true,
        startTime: Date.now(),

    };
}

function resetAI(p){
    p.targetX = null;
    p.targetY = null;
}

function resetAIState(p){

    p.targetY = null;
    p.deathTime = 0;

function startTournament(){
    running = true;
    matches = [];
    participants = [];
    waitingQueue = [];

    participants.push(

                Math.random()*canvas.height,
                `hsl(${i*360/aiBotCount},100%,50%)`,
                "Bot "+(i+1)
            )
        );
    }

    waitingQueue = [...participants];
    seededMatchmaking();
}

// SEEDED MATCHMAKING - Match by ELO ranking with slight variation
function seededMatchmaking(){
    const activeCount = matches.length * 2;
    const idle = waitingQueue.length;
    const everyoneIdle = activeCount === 0;
    if(idle < 4 && !everyoneIdle) return;

    let sorted = [...waitingQueue].sort((a,b)=>b.elo-a.elo);
    waitingQueue = [];
    let unmatched = sorted;

    while(unmatched.length >= 2){
        const p1 = unmatched.shift();

        let bestIdx = 0;
        let bestDiff = Infinity;
        const cap = Math.min(3, unmatched.length);
        for(let i=0;i<cap;i++){
            const cand = unmatched[i];
            const last = recentOpponents.get(p1.name);
            if(last === cand.name && cap > 1) continue;
            const diff = Math.abs(cand.elo - p1.elo);
            if(diff < bestDiff){ bestDiff = diff; bestIdx = i; }
        }
        const p2 = unmatched.splice(bestIdx,1)[0];

        recentOpponents.set(p1.name, p2.name);
        recentOpponents.set(p2.name, p1.name);

        const match = createMatch(p1,p2);
        setupMatch(match);
        matches.push(match);
        playerMatchMap.set(p1.name, match);
        playerMatchMap.set(p2.name, match);
    }
    waitingQueue.push(...unmatched);
}


function setupMatch(match){
    const [p1, p2] = match.players;

    for(const p of match.players){
        resetAIState(p);
        p.alive = true;
    }

    p1.x = canvas.width * 0.3;
    p1.y = canvas.height * 0.5;

    p2.x = canvas.width * 0.7;
    p2.y = canvas.height * 0.5;

    if(match.players.some(p => p.name === "DU")){
        spectateMatchId = match.id;
        spectatorMode = true;
        document.getElementById("spectatorInfo").style.display = "block";
    }

    match.balls = [];
    match.lastSpawn = Date.now();
    match.spawnDelay = spawnDelay;

    for(let i = 0; i < startBallCount; i++){
        createBallForMatch(match);
    }
}

    if(survived>record){

        localStorage.setItem("fingerDodgeRecord",record);

    document.getElementById("finalTime").textContent=survived;

// UPDATE
function update(){
    if(!running) return;

    if(mode === "tournament"){
        updateTournament();
        return;
    }

    document.getElementById("time").textContent = Math.floor((Date.now()-startTime)/1000);

    // MOVEMENT
    if(mode==="multi"){
        if(keys["w"]) players[0].y-=5;
        if(keys["s"]) players[0].y+=5;
        if(keys["a"]) players[0].x-=5;
        if(keys["d"]) players[0].x+=5;

        if(keys["arrowup"]) players[1].y-=5;
        if(keys["arrowdown"]) players[1].y+=5;
        if(keys["arrowleft"]) players[1].x-=5;
        if(keys["arrowright"]) players[1].x+=5;
    }

    if((mode==="ai" || mode==="single" || mode==="multi") && mode !== "tournament"){
        for(const p of players){
            if(p.alive && p.name !== HUMAN_NAME && p.name.startsWith("Bot")){
                updateAI(p, balls);
            }
        }
    }

    // bounds
    for(const p of players){
        p.x=Math.max(p.radius,Math.min(canvas.width-p.radius,p.x));
        p.y=Math.max(p.radius,Math.min(canvas.height-p.radius,p.y));
    }

    // balls
    for(const b of balls){
        b.x += b.vx;
        b.y += b.vy;

        if(b.x - b.radius < 0 || b.x + b.radius > canvas.width){
            b.vx *= -1;
            b.x = Math.max(b.radius, Math.min(canvas.width - b.radius, b.x));
        }

        if(b.y - b.radius < 0 || b.y + b.radius > canvas.height){
            b.vy *= -1;
            b.y = Math.max(b.radius, Math.min(canvas.height - b.radius, b.y));
        }
    }

    // collision
    if(mode !== "tournament"){
        for(const p of players){
            check(p);
        }
    }
}

function updateTournament(){
    for(const match of [...matches]){
        if(!match.running) continue;
        updateMatch(match);
    }
  // Abgelaufene Matches endgültig entfernen
    matches = matches.filter(m => m.running);
    updateEloTable();
}

function updateMatch(match){
    if(!match.running) return;

    const players = match.players;

    // AI - ONLY DODGE BALLS
    for(const p of players){
        if(p.alive && p.name.startsWith("Bot")){
            updateAI(p, match.balls);
        }
    }

    // Human player movement in tournament
    for(const p of players){
        if(p.name === "DU" && running){
            // Human controls handled by moveSingle()
        }
    }

    // BALLS
    for(const b of match.balls){
        b.x += b.vx;
        b.y += b.vy;

        if(b.x - b.radius < 0 || b.x + b.radius > canvas.width){
            b.vx *= -1;
        }

        if(b.y - b.radius < 0 || b.y + b.radius > canvas.height){
            b.vy *= -1;
        }
    }

    // SPAWN
    const now = Date.now();
    if(now - match.lastSpawn >= match.spawnDelay){
        createBallForMatch(match);
        match.lastSpawn = now;
    }

    // COLLISION
    // COLLISION
    for(const p of players){
        if(!p.alive) continue;

        for(const b of match.balls){
            const dx = p.x - b.x;
            const dy = p.y - b.y;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < p.radius + b.radius){
                p.alive = false;
                const alive = players.filter(x => x.alive);

                if(alive.length <= 1){
                    // Match sofort beenden und aus Liste entfernen
                    match.running = false;
                    clearInterval(match.spawnTimer);
                    finishMatch(match, alive[0] || players.find(x => !x.alive), p);
                    return; // Wichtig: Schleife abbrechen, da Match gelöscht wird
                }
            }
        }
    }
}
function check(p){
    if(!p.alive) return;

    for(const b of balls){
        const dx = p.x - b.x;
        const dy = p.y - b.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < p.radius + b.radius){
            p.alive = false;
            p.deathTime = Date.now();
            eliminated.push(p);

            const alive = players.filter(x=>x.alive);

            if(alive.length <= 1){
                if(alive.length === 1){
                    alive[0].deathTime = Infinity;
                    eliminated.push(alive[0]);
                }
                finishArena();
            }
            return;
        }
    }
}

function finishMatch(match, winner, loser){
    clearInterval(match.spawnTimer);
    match.running = false;

    const now = Date.now();

    rematchCooldown.set(winner.name, now);
    rematchCooldown.set(loser.name, now);

    const diff = loser.elo - winner.elo;

let change = 5 + diff / 100;

// Begrenzung
change = Math.max(1, Math.min(15, change));

winner.elo += change;
loser.elo -= change;

winner.lastChange = change;
loser.lastChange = -change;

    winner.alive = true;
    loser.alive = true;

    winner.arenaScore = (winner.arenaScore || 0) + 1;

    // Update ranking with new ELO
    const winnerRanked = ranking.find(x => x.name === winner.name);
    const loserRanked = ranking.find(x => x.name === loser.name);
    if(winnerRanked) winnerRanked.elo = winner.elo;
    if(loserRanked) loserRanked.elo = loser.elo;

    matches = matches.filter(m => m.id !== match.id);

    playerMatchMap.delete(winner.name);
    playerMatchMap.delete(loser.name);

    const nextMatchDelay = 2500 + Math.random() * 1500;

    setTimeout(() => {
        resetAI(winner);
        resetAI(loser);

        waitingQueue.push(winner);
        waitingQueue.push(loser);

        seededMatchmaking();
    }, nextMatchDelay);
}

function finishArena(){
    if(mode !== "tournament"){
        running = false;
    }

    if(spawnTimer){
        clearTimeout(spawnTimer);
    }

    eliminated.sort((a,b)=>b.deathTime-a.deathTime);

    if(rankingMode==="points"){
        const totalPlayers = eliminated.length;

        for(let i=0;i<eliminated.length;i++){
            const p = eliminated[i];
            const rankPlayer = ranking.find(x=>x.name===p.name);
            const gainedPoints = totalPlayers - i;

            if(rankPlayer){
                rankPlayer.points += gainedPoints;
            }else{
                ranking.push({
                    name:p.name,
                    color:p.color,
                    points:gainedPoints,
                    elo:1500,
                    lastChange:0
                });
            }
        }
    }else{
        const K = 24;

        for(const bot of ranking){
            bot.lastChange = 0;
        }

        for(let i=0;i<eliminated.length;i++){
            for(let j=i+1;j<eliminated.length;j++){
                let a = ranking.find(x=>x.name===eliminated[i].name);

                if(!a){
                    a = {
                        name:eliminated[i].name,
                        color:eliminated[i].color,
                        points:0,
                        elo:1500,
                        lastChange:0
                    };
                    ranking.push(a);
                }

                let b = ranking.find(x=>x.name===eliminated[j].name);

                if(!b){
                    b = {
                        name:eliminated[j].name,
                        color:eliminated[j].color,
                        points:0,
                        elo:1500,
                        lastChange:0
                    };
                    ranking.push(b);
                }

                const expectedA = 1/(1+Math.pow(10,(b.elo-a.elo)/400));
                const expectedB = 1-expectedA;

                const changeA = K*(1-expectedA);
                const changeB = K*(0-expectedB);

                a.elo += changeA;
                b.elo += changeB;

                a.lastChange += changeA;
                b.lastChange += changeB;
            }
        }
    }

    updateRanking();

    const winner = eliminated[0];

    document.getElementById("gameOver").style.display = "flex";
    document.getElementById("finalTime").innerHTML =
        "Runde " + currentRound + "/" + tournamentRounds + "<br>Sieger: " + winner.name;

    if(currentRound < tournamentRounds){
        currentRound++;
        setTimeout(()=>{
            document.getElementById("gameOver").style.display = "none";
            startGame(mode);
        },15000);
    }else{
        document.getElementById("finalTime").innerHTML += "<br><br><b>TURNIER BEENDET</b>";
    }
}

function updateRanking(){
    let sorted;

    if(rankingMode==="elo"){
        sorted = [...ranking].sort((a,b)=>b.elo-a.elo);
    }else{
        sorted = [...ranking].sort((a,b)=>b.points-a.points);
    }

    let html = "<b>TURNIER RANKING</b><br><br>";

    for(let i=0;i<sorted.length;i++){
        if(rankingMode==="elo"){
            html += (i+1)+". "+sorted[i].name+" | "+Math.round(sorted[i].elo)+" ELO "+
                "("+(sorted[i].lastChange>=0?"+":"")+Math.round(sorted[i].lastChange)+")<br>";
        }else{
            html += (i+1)+". "+sorted[i].name+" | "+sorted[i].points+" Punkte<br>";
        }
    }

    document.getElementById("ranking").innerHTML = html;
}

let lastEloRender = 0;
function updateEloTable(){
    if(Date.now() - lastEloRender < 400) return;
    lastEloRender = Date.now();

    let sorted = [...participants].sort((a,b)=>b.elo-a.elo);
    let html = "";
    for(let i=0;i<sorted.length;i++){
        const p = sorted[i];
        const active = isPlayerInMatch(p);
        const statusColor = active ? "lime" : "red";
        html += `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <div style="width:12px;height:12px;border-radius:50%;background:${statusColor};flex-shrink:0;"></div>
            <div>${i+1}. ${p.name}<br>${Math.round(p.elo)}
                <span style="color:${p.lastChange>=0?'lime':'red'}">
                (${p.lastChange>=0?'+':''}${Math.round(p.lastChange)})</span>
            </div>
        </div>`;
    }
    for(const match of matches){
        html += `
        <div data-match-id="${match.id}" style="margin-bottom:8px;cursor:pointer;
             color:${match.id === spectateMatchId ? 'lime' : 'yellow'}">
            🎥 ${match.players[0].name} vs ${match.players[1].name}
        </div>`;
    }
      // Eigene ELO und Platz in der oberen UI anzeigen
    const me = participants.find(p => p.name === "DU");
    if(me){
        const myRank = sorted.findIndex(p => p.name === "DU") + 1;
        document.getElementById("time").textContent = Math.round(me.elo);
        document.getElementById("record").textContent = myRank;
        document.getElementById("balls").textContent = participants.length;
    }
    document.getElementById("eloList").innerHTML = html;
}

function isPlayerInMatch(player){
    return matches.some(match =>
        match.running &&
        match.players.includes(player)
    );
}

// DRAW
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(mode === "tournament" && spectateMatchId){
        const match = matches.find(m => m.id === spectateMatchId);

        if(!match) return;

        // BALLS
        for(const b of match.balls){
            ctx.beginPath();
            ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
            ctx.fillStyle="#ff4444";
            ctx.fill();
        }

        // PLAYERS
        for(const p of match.players){
            if(!p.alive) continue;

            ctx.beginPath();
            ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
            ctx.fillStyle=p.color;
            ctx.fill();

            ctx.fillStyle="white";
            ctx.font="14px Arial";
            ctx.textAlign="center";
            ctx.fillText(p.name, p.x, p.y - p.radius - 10);
        }

        // Update spectator info
        if(spectatorMode){
            const myMatch = playerMatchMap.get("DU");
            if(myMatch && myMatch.running){
                const opponent = myMatch.players.find(p => p.name !== "DU");
                document.getElementById("spectatorText").innerHTML =
    "Dein Gegner: <b>" + opponent.name + "</b><br>" +
    "ELO: " + Math.round(opponent.elo) + "<br>" +
    "Skill: " + Math.round(opponent.skill * 100) + "%";
            } else if(spectateMatchId){
                const watchedMatch = matches.find(m => m.id === spectateMatchId);
                if(watchedMatch){
                    document.getElementById("spectatorText").innerHTML = 
                        "👁 Du guckst zu:<br><b>" + watchedMatch.players[0].name + 
                        " vs " + watchedMatch.players[1].name + "</b>";
                }
            }
        }

        return;
    }

    if(mode === "tournament"){
        const myMatch = playerMatchMap.get("DU");
        if(myMatch && myMatch.running){
            for(const b of myMatch.balls){
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
                ctx.fillStyle = "#ff4444";
                ctx.fill();
            }
        }
    }else{
        for(const b of balls){
            ctx.beginPath();
            ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
            ctx.fillStyle="#ff4444";
            ctx.fill();
        }
    }

    let render = players;

    if(mode === "tournament"){
        const myMatch = playerMatchMap.get("DU");
        render = myMatch ? myMatch.players : [];
    }

    for(const p of render){
        if(!p.alive) continue;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();

        ctx.fillStyle="white";
        ctx.font="14px Arial";
        ctx.textAlign="center";
        ctx.fillText(p.name, p.x, p.y - p.radius - 10);
    }
}

// SINGLE CONTROL
function moveSingle(x,y){
    if(mode === "tournament"){
        const match = playerMatchMap.get("DU");
        if(!match) return;

        const me = match.players.find(p => p.name === "DU");
        if(!me) return;

        me.x = x;
        me.y = y;
        return;
    }

    if(players[0]){
        players[0].x = x;
        players[0].y = y;
    }
}

document.addEventListener("keydown", (e) => {
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener("mousemove",(e)=>{
    if(running && (mode==="single" || mode==="tournament")){
        moveSingle(e.clientX,e.clientY);
    }
});

canvas.addEventListener("touchmove",(e)=>{
    if(running && (mode==="single" || mode==="tournament")){
        moveSingle(e.touches[0].clientX,e.touches[0].clientY);
    }
});
document.getElementById("eloList").addEventListener("click", (e) => {
    const el = e.target.closest("[data-match-id]");
    if(!el) return;
    spectateMatchId = el.dataset.matchId;
    spectatorMode = true;
});

setInterval(() => {
    if(mode === "tournament" && running && waitingQueue.length >= 2){
        seededMatchmaking();
    }
}, 1000);

loop();
</script>
