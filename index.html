<script>
// ════════════════════════════════════════════════════════════════════════════
//  CANVAS & RESIZE
// ════════════════════════════════════════════════════════════════════════════
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener("resize",resize);

// ════════════════════════════════════════════════════════════════════════════
//  FIREBASE HELPERS (lazy – waits for module to load)
// ════════════════════════════════════════════════════════════════════════════
let fbReady=false;
window.addEventListener("firebaseReady",()=>{fbReady=true;});

function dbRef(path){return window._firebaseRef(window._firebaseDB,path);}
async function dbGet(path){return (await window._firebaseGet(dbRef(path))).val();}
async function dbSet(path,val){return window._firebaseSet(dbRef(path),val);}
async function dbUpdate(path,val){return window._firebaseUpdate(dbRef(path),val);}
function dbOn(path,cb){window._firebaseOnValue(dbRef(path),snap=>cb(snap.val()));}
async function dbRemove(path){return window._firebaseRemove(dbRef(path));}

// ════════════════════════════════════════════════════════════════════════════
//  ACCOUNT (stored in localStorage + Firebase)
// ════════════════════════════════════════════════════════════════════════════
let onlineAccount=null; // {name, elo, wins, losses}
(function loadAccount(){
  const raw=localStorage.getItem("dobAccount");
  if(raw){try{onlineAccount=JSON.parse(raw);}catch(e){}}
})();

function saveAccountLocal(){
  if(onlineAccount)localStorage.setItem("dobAccount",JSON.stringify(onlineAccount));
}

async function pushAccountToFirebase(){
  if(!fbReady||!onlineAccount)return;
  await dbSet("players/"+onlineAccount.name,{
    name:onlineAccount.name,
    elo:onlineAccount.elo,
    wins:onlineAccount.wins,
    losses:onlineAccount.losses,
    updatedAt:Date.now()
  });
}

// ════════════════════════════════════════════════════════════════════════════
//  SCREEN ROUTER
// ════════════════════════════════════════════════════════════════════════════
const SCREENS=["menu","settings","accountScreen","leaderboardScreen","onlineWait","vsScreen","winnerOverlay","gameOver"];

function hideAllScreens(){
  SCREENS.forEach(s=>{
    const el=document.getElementById(s);
    if(el)el.style.display="none";
  });
  document.getElementById("homeBtn").style.display="block";
}

// ════════════════════════════════════════════════════════════════════════════
//  SETTINGS
// ════════════════════════════════════════════════════════════════════════════
let startBallCount=3,spawnDelay=5000,ballSpeedMultiplier=0.5;
let playerRadiusSetting=18,aiBotCount=10,rankingMode="points";

function openSettings(){showScreen("settings");}
function saveSettings(){
  startBallCount=Number(document.getElementById("startBalls").value);
  spawnDelay=Number(document.getElementById("spawnTime").value)*1000;
  ballSpeedMultiplier=Number(document.getElementById("ballSpeed").value);
  playerRadiusSetting=18; // fixed
  aiBotCount=Number(document.getElementById("botCount").value);
  rankingMode=document.getElementById("rankingMode").value;
  showScreen("menu");
}

// ════════════════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════════════════
let balls=[],players=[],ranking=[],eliminated=[];
let running=false,startTime=0,spawnTimer=null;
let mode="single";
let tournamentRounds=100,currentRound=1;
let participants=[],matches=[],waitingQueue=[];
let playerMatchMap=new Map(),recentOpponents=new Map();
const HUMAN_NAME="DU";
let keys={};

// Spectator
let spectateModeActive=false,spectateMatchId=null,followMode="none",targetName=null,humanRemovedFromQueue=false;

// Coin
let coins=[],coinScorePlayer=0,coinTimeLeft=60,coinInterval=null;

// Mirror
let mirrorBot=null;
let survivalWave=1;

// Online
let onlineMatchId=null,onlineRole=null,onlineOpponent=null;
let onlineMatchRef=null,onlineUnsubscribe=null;
let onlineSearchInterval=null;

let record=localStorage.getItem("fingerDodgeRecord")||0;
document.getElementById("record").textContent=record;

// ════════════════════════════════════════════════════════════════════════════
//  HOME BUTTON
// ════════════════════════════════════════════════════════════════════════════
function confirmHome(){
  if(confirm("Return to main menu?")){
    exitToMenu();
  }
}
function exitToMenu(){
  running=false;
  if(spawnTimer)clearTimeout(spawnTimer);
  if(spawnTimer&&typeof spawnTimer==="number")clearInterval(spawnTimer);
  if(coinInterval)clearInterval(coinInterval);
  cleanupOnline();
  balls=[];players=[];eliminated=[];matches=[];
  document.getElementById("eloTable").style.display="none";
  document.getElementById("coinHUD").style.display="none";
  document.getElementById("opponentInfo").style.display="none";
  document.getElementById("spectatorInfo").style.display="none";
  document.getElementById("winnerOverlay").style.display="none";
  showScreen("menu");
}

// ════════════════════════════════════════════════════════════════════════════
//  ELO ANIMATION
// ════════════════════════════════════════════════════════════════════════════
function showEloAnimation(change){
  const el=document.getElementById("eloResult");
  const won=change>0;
  el.style.animation="none";el.offsetHeight;
  el.style.color=won?"#00ff88":"#ff4444";
  el.style.textShadow=`0 0 40px ${won?"#00ff88":"#ff4444"}`;
  el.innerHTML=(won?"✓ +":"✗ ")+Math.round(Math.abs(change))+" ELO<br>"
    +(won?'<span style="font-size:40px">WIN</span>':'<span style="font-size:40px">LOST</span>');
  el.style.animation="eloPopIn 2.5s ease forwards";
}

// ════════════════════════════════════════════════════════════════════════════
//  LEADERBOARD
// ════════════════════════════════════════════════════════════════════════════
async function loadLeaderboard(){
  const lbTable=document.getElementById("lbTable");
  lbTable.innerHTML='<div class="lb-row"><span>Rank</span><span>Name</span><span>ELO</span><span>W/L</span></div>';
  if(!fbReady){lbTable.innerHTML+='<div class="lb-row"><span colspan="4">Firebase not connected</span></div>';return;}
  try{
    const data=await dbGet("players");
    if(!data){lbTable.innerHTML+='<div class="lb-row"><span>No players yet</span></div>';return;}
    const sorted=Object.values(data).sort((a,b)=>b.elo-a.elo);
    sorted.forEach((p,i)=>{
      const isMe=onlineAccount&&p.name===onlineAccount.name;
      lbTable.innerHTML+=`<div class="lb-row${isMe?" lb-me":""}">
        <span>#${i+1}</span><span>${p.name}</span><span>${Math.round(p.elo)}</span>
        <span>${p.wins||0}/${p.losses||0}</span></div>`;
    });
  }catch(e){lbTable.innerHTML+='<div class="lb-row"><span>Error loading</span></div>';}
}

// ════════════════════════════════════════════════════════════════════════════
//  ONLINE FLOW
// ════════════════════════════════════════════════════════════════════════════
function showScreen_onlineFlow(){
  // If no account → create one first
  if(!onlineAccount){
    showCreateAccount();
  } else {
    enterOnlineQueue();
  }
}

function showCreateAccount(){
  showScreen("accountScreen");
  const el=document.getElementById("accountContent");
  el.innerHTML=`
    <p style="color:#aaa;margin-bottom:18px;font-size:16px;">Choose your username (cannot be changed later)</p>
    <input type="text" id="newUsername" placeholder="Username" maxlength="20">
    <br>
    <div id="accountInfo"></div>
    <br>
    <button onclick="createAccount()">Create Account</button>
    <button onclick="showScreen('menu')">← Back</button>
  `;
}

async function createAccount(){
  const name=document.getElementById("newUsername").value.trim();
  const info=document.getElementById("accountInfo");
  if(!name||name.length<2){info.textContent="Name must be at least 2 characters.";info.style.color="#f44";return;}
  if(!/^[a-zA-Z0-9_-]+$/.test(name)){info.textContent="Only letters, numbers, _ and - allowed.";info.style.color="#f44";return;}
  if(fbReady){
    const existing=await dbGet("players/"+name);
    if(existing){info.textContent="Name already taken. Choose another.";info.style.color="#f44";return;}
  }
  onlineAccount={name,elo:1500,wins:0,losses:0};
  saveAccountLocal();
  if(fbReady) await pushAccountToFirebase();
  enterOnlineQueue();
}

function enterOnlineQueue(){
  if(!onlineAccount){showCreateAccount();return;}
  showScreen("onlineWait");
  document.getElementById("onlineStatus").textContent="Searching for opponent…";
  startSearchingOnline();
}

function cancelOnline(){
  cleanupOnline();
  showScreen("menu");
}

function cleanupOnline(){
  if(onlineSearchInterval){clearInterval(onlineSearchInterval);onlineSearchInterval=null;}
  if(onlineUnsubscribe){onlineUnsubscribe();onlineUnsubscribe=null;}
  if(onlineMatchId&&fbReady){
    // Remove our queue entry
    dbRemove("queue/"+onlineAccount?.name).catch(()=>{});
  }
  onlineMatchId=null;onlineRole=null;onlineOpponent=null;
}

async function startSearchingOnline(){
  if(!fbReady){
    document.getElementById("onlineStatus").textContent="Firebase not connected. Cannot play online.";
    return;
  }
  // Write ourselves to queue
  await dbSet("queue/"+onlineAccount.name,{
    name:onlineAccount.name,
    elo:onlineAccount.elo,
    ts:Date.now()
  });

  // Poll queue every 2s to find a match
  onlineSearchInterval=setInterval(async()=>{
    try{await tryMatchmake();}catch(e){console.warn(e);}
  },2000);
  // Also try immediately
  setTimeout(()=>tryMatchmake(),500);
}

async function tryMatchmake(){
  if(onlineMatchId) return;

  const queue = await dbGet("queue");
  if(!queue) return;

  const others = Object.values(queue)
    .filter(p => p.name !== onlineAccount.name);

  if(!others.length) return;

  others.sort((a,b)=>
    Math.abs(a.elo-onlineAccount.elo) -
    Math.abs(b.elo-onlineAccount.elo)
  );

  const opp = others[0];
  const matchId = [onlineAccount.name, opp.name].sort().join("__");

  const existing = await dbGet("onlineMatches/"+matchId);

  if(existing && existing.status !== "done"){
    joinMatch(matchId, opp);
    return;
  }

  const matchData = {
    p1: onlineAccount.name,
    p2: opp.name,
    p1elo: onlineAccount.elo,
    p2elo: opp.elo,
    status: "waiting",
    winner: null,
    createdAt: Date.now()
  };

  await dbSet("onlineMatches/"+matchId, matchData);

  await dbRemove("queue/"+onlineAccount.name);
  await dbRemove("queue/"+opp.name);

  joinMatch(matchId, opp);
}

function joinMatch(matchId,opp){
  if(onlineMatchId)return;
  if(onlineSearchInterval){clearInterval(onlineSearchInterval);onlineSearchInterval=null;}
  onlineMatchId=matchId;
  onlineOpponent=opp;
  onlineRole=(onlineAccount.name<opp.name)?"p1":"p2";

  showVSScreen(onlineAccount.name,onlineAccount.elo,opp.name,opp.elo,()=>{
    startOnlineGame();
  });
}

// ════════════════════════════════════════════════════════════════════════════
//  AI
// ════════════════════════════════════════════════════════════════════════════
function updateAI(p,activeBalls=balls){
  const skill=((p.skill?.aim??0.5)+(p.skill?.reaction??0.5)+(p.skill?.movement??0.5)+(p.skill?.awareness??0.5)+(p.skill?.aggression??0.5))/5;
  const inaccuracy=1-skill;
  let danger=false;
  for(const b of activeBalls){
    const dx=p.x-b.x,dy=p.y-b.y;
    if(Math.sqrt(dx*dx+dy*dy)<p.awareness){danger=true;break;}
  }
  if(Math.random()<inaccuracy*0.04)return;
  if(!danger){
    if(p.targetX===null||p.targetY===null||Math.random()<(0.015+inaccuracy*0.05)){
      p.targetX=Math.random()*canvas.width;
      p.targetY=Math.random()*canvas.height;
    }
  }
  let moveX=p.targetX-p.x,moveY=p.targetY-p.y;
  moveX+=(Math.random()-0.5)*120*inaccuracy;
  moveY+=(Math.random()-0.5)*120*inaccuracy;
  let moveDist=Math.sqrt(moveX*moveX+moveY*moveY)||1;
  moveX/=moveDist;moveY/=moveDist;
  let avoidX=0,avoidY=0;
  const wallMargin=140;
  if(p.x<wallMargin)avoidX+=(wallMargin-p.x)*0.03;
  if(p.x>canvas.width-wallMargin)avoidX-=(p.x-(canvas.width-wallMargin))*0.03;
  if(p.y<wallMargin)avoidY+=(wallMargin-p.y)*0.03;
  if(p.y>canvas.height-wallMargin)avoidY-=(p.y-(canvas.height-wallMargin))*0.03;
  for(const b of activeBalls){
    const dx=p.x-b.x,dy=p.y-b.y;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    if(dist<p.awareness){
      const strength=Math.max(0,(p.awareness-dist)/p.awareness);
      const force=strength*p.dodgePower*(0.7+skill*0.6);
      avoidX+=(dx/dist)*force;
      avoidY+=(dy/dist)*force;
    }
  }
  p.aiVX??=0;p.aiVY??=0;
  const steering=0.08+skill*0.18;
  p.aiVX+=(moveX*4+avoidX*10-p.aiVX)*steering;
  p.aiVY+=(moveY*4+avoidY*10-p.aiVY)*steering;
  p.aiVX+=(Math.random()-0.5)*p.randomness*0.6;
  p.aiVY+=(Math.random()-0.5)*p.randomness*0.6;
  const len=Math.sqrt(p.aiVX*p.aiVX+p.aiVY*p.aiVY)||1;
  p.x+=(p.aiVX/len)*p.speed;
  p.y+=(p.aiVY/len)*p.speed;
  p.x+=Math.sin(Date.now()*0.002+p.y*0.01)*inaccuracy*0.8;
  p.y+=Math.cos(Date.now()*0.002+p.x*0.01)*inaccuracy*0.8;
  p.x=Math.max(p.radius,Math.min(canvas.width-p.radius,p.x));
  p.y=Math.max(p.radius,Math.min(canvas.height-p.radius,p.y));
  p.lastVX=p.aiVX;p.lastVY=p.aiVY;
}

function createPlayer(x,y,color,name){
  const skill={aim:Math.random(),reaction:Math.random(),movement:Math.random(),awareness:Math.random(),aggression:Math.random()};
  const humanSkill=(skill.aim+skill.reaction+skill.movement+skill.awareness+skill.aggression)/5;
  const balancedSkill=0.5+(humanSkill-0.5)*0.9;
  return {
    x,y,radius:playerRadiusSetting,color,name,skill,
    points:0,elo:1500,lastChange:0,alive:true,games:0,
    speed:1.0+balancedSkill*1.2,
    reaction:0.25+balancedSkill*1.0,
    awareness:70+balancedSkill*90,
    randomness:(1-balancedSkill)*4.0,
    dodgePower:0.4+balancedSkill*1.6,
    targetX:null,targetY:null,
    lastVX:0,lastVY:0,
    stats:{wins:0,losses:0,totalEloGain:0,totalEloLoss:0,matchesPlayed:0,bestStreak:0,currentStreak:0}
  };
}

function createBall(){
  const r=15+Math.random()*20;
  let x,y,valid=false;
  while(!valid){
    x=Math.random()*(canvas.width-r*2)+r;
    y=Math.random()*(canvas.height-r*2)+r;
    valid=true;
    for(const p of players){
      const dx=p.x-x,dy=p.y-y;
      if(Math.sqrt(dx*dx+dy*dy)<p.radius+r+80){valid=false;break;}
    }
  }
  const spd=5+Math.random()*6,ang=Math.random()*Math.PI*2;
  balls.push({x,y,radius:r,vx:Math.cos(ang)*spd*ballSpeedMultiplier,vy:Math.sin(ang)*spd*ballSpeedMultiplier});
}
function createBallForMatch(match){
  const r=15+Math.random()*20;
  let x,y,valid=false;
  while(!valid){
    x=Math.random()*(canvas.width-r*2)+r;
    y=Math.random()*(canvas.height-r*2)+r;
    valid=true;
    for(const p of match.players){
      if(!p.alive)continue;
      const dx=p.x-x,dy=p.y-y;
      if(Math.sqrt(dx*dx+dy*dy)<p.radius+r+80){valid=false;break;}
    }
  }
  const spd=5+Math.random()*6,ang=Math.random()*Math.PI*2;
  match.balls.push({x,y,radius:r,vx:Math.cos(ang)*spd*ballSpeedMultiplier,vy:Math.sin(ang)*spd*ballSpeedMultiplier});
}
function spawnLoop(){
  spawnTimer=setTimeout(()=>{if(running){createBall();spawnLoop();}},spawnDelay);
}

function startTournament(){
  running=true;matches=[];participants=[];waitingQueue=[];humanRemovedFromQueue=false;
  recentOpponents.clear();
  participants.push(createPlayer(canvas.width/2,canvas.height/2,"#00ff88","YOU"));
  let skillList=[];
  for(let i=0;i<aiBotCount;i++)skillList.push((i+1)/aiBotCount);
  for(let i=skillList.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[skillList[i],skillList[j]]=[skillList[j],skillList[i]];}
  for(let i=0;i<aiBotCount;i++){
    const bot=createPlayer(Math.random()*canvas.width,Math.random()*canvas.height,`hsl(${i*360/aiBotCount},100%,50%)`,"Bot "+(i+1));
    bot.skill=skillList[i];
    bot.speed=1.5+bot.skill*8;bot.reaction=2+bot.skill*6;
    bot.awareness=60+bot.skill*100;bot.dodgePower=0.5+bot.skill*3.5;bot.randomness=(1-bot.skill)*4;
    participants.push(bot);
  }
  waitingQueue=[...participants];
  seededMatchmaking();
}

function seededMatchmaking(){
  if(waitingQueue.length<2)return;
  const used=new Set();
  function findBestOpponent(p1,list){
    let best=null,bestDiff=Infinity;
    for(const p2 of list){
      if(p1===p2||used.has(p2.name))continue;
      if(recentOpponents.get(p1.name)===p2.name)continue;
      const diff=Math.abs(p1.elo-p2.elo);
      if(diff<bestDiff){bestDiff=diff;best=p2;}
    }
    return best;
  }
  const queue=[...waitingQueue];
  waitingQueue=[];
  for(const p1 of queue){
    if(used.has(p1.name))continue;
    const p2=findBestOpponent(p1,queue);
    if(p2){
      used.add(p1.name);used.add(p2.name);
      recentOpponents.set(p1.name,p2.name);recentOpponents.set(p2.name,p1.name);
      const match=createMatch(p1,p2);
      setupMatch(match);
      matches.push(match);
      playerMatchMap.set(p1.name,match);playerMatchMap.set(p2.name,match);
    } else {
      waitingQueue.push(p1);
    }
  }
}

function createMatch(p1,p2){
  return{id:crypto.randomUUID(),players:[p1,p2],balls:[],running:true,startTime:Date.now(),lastSpawn:Date.now(),spawnDelay};
}
function resetAI(p){p.targetX=null;p.targetY=null;}
function resetAIState(p){p.targetX=null;p.targetY=null;p.deathTime=0;p.alive=true;p.lastVX=0;p.lastVY=0;}
function setupMatch(match){
  const[p1,p2]=match.players;
  for(const p of match.players){resetAIState(p);p.alive=true;}
  p1.x=canvas.width/2-canvas.width*0.25;p1.y=canvas.height*0.5;
  p2.x=canvas.width/2+canvas.width*0.25;p2.y=canvas.height*0.5;
  match.balls=[];match.lastSpawn=Date.now();match.spawnDelay=spawnDelay;
  for(let i=0;i<startBallCount;i++)createBallForMatch(match);
  if(!spectateModeActive){const humanHere=match.players.some(p=>p.name==="YOU");if(humanHere)spectateMatchId=match.id;}
}

//  UPDATE
// ════════════════════════════════════════════════════════════════════════════
function update(){
  if(!running)return;
  if(mode==="tournament"){updateTournament();return;}

  document.getElementById("time").textContent=Math.floor((Date.now()-startTime)/1000);

  if(mode==="multi"){
    if(keys["w"])players[0].y-=5;if(keys["s"])players[0].y+=5;
    if(keys["a"])players[0].x-=5;if(keys["d"])players[0].x+=5;
    if(keys["arrowup"])players[1].y-=5;if(keys["arrowdown"])players[1].y+=5;
    if(keys["arrowleft"])players[1].x-=5;if(keys["arrowright"])players[1].x+=5;
  }

  if(mode==="mirror"&&mirrorBot&&mirrorBot.alive)updateAI(mirrorBot,balls);

  for(const p of players)
    if(p.alive&&!["Player","Player 1","Player 2","YOU","Mirror"].includes(p.name)&&p.name.startsWith("Bot"))
      updateAI(p,balls);

  

  for(const p of players){
    p.x=Math.max(p.radius,Math.min(canvas.width-p.radius,p.x));
    p.y=Math.max(p.radius,Math.min(canvas.height-p.radius,p.y));
  }

  for(const b of balls){
    b.x+=b.vx;b.y+=b.vy;
    if(b.x-b.radius<0||b.x+b.radius>canvas.width){b.vx*=-1;b.x=Math.max(b.radius,Math.min(canvas.width-b.radius,b.x));}
    if(b.y-b.radius<0||b.y+b.radius>canvas.height){b.vy*=-1;b.y=Math.max(b.radius,Math.min(canvas.height-b.radius,b.y));}
  }

  if(mode==="coin"){
    for(const p of players){
      if(!p.alive)continue;
      for(let i=coins.length-1;i>=0;i--){
        const c=coins[i];
        const dx=p.x-c.x,dy=p.y-c.y;
        if(Math.sqrt(dx*dx+dy*dy)<p.radius+c.r){
          if(p.name==="Player"){coinScorePlayer+=c.value;document.getElementById("coinScore").textContent=coinScorePlayer;}
          coins.splice(i,1);
          if(Math.random()<0.4)spawnCoin();
        }
      }
    }
  }

  for(const p of players)checkCollision(p);
}

function updateTournament(){
  for(const match of[...matches])if(match.running)updateMatch(match);
  matches=matches.filter(m=>m.running);
  updateEloTable();
  autoFollowSpectate();
}

function updateMatch(match){
  if(!match.running)return;
  for(const p of match.players)
    if(p.alive&&p.name.startsWith("Bot"))updateAI(p,match.balls);
  for(const b of match.balls){
    b.x+=b.vx;b.y+=b.vy;
    if(b.x-b.radius<0||b.x+b.radius>canvas.width)b.vx*=-1;
    if(b.y-b.radius<0||b.y+b.radius>canvas.height)b.vy*=-1;
  }
  const now=Date.now();
  if(now-match.lastSpawn>=match.spawnDelay){createBallForMatch(match);match.lastSpawn=now;}
  for(const p of match.players){
    if(!p.alive)continue;
    for(const b of match.balls){
      const dx=p.x-b.x,dy=p.y-b.y;
      if(Math.sqrt(dx*dx+dy*dy)<p.radius+b.radius){
        p.alive=false;
        const alive=match.players.filter(x=>x.alive);
        if(alive.length<=1){
          match.running=false;
          finishMatch(match,alive[0]||match.players.find(x=>x!==p),p);
          return;
        }
      }
    }
  }
}

function checkCollision(p){
  if(!p.alive)return;
  for(const b of balls){
    const dx=p.x-b.x,dy=p.y-b.y;
    if(Math.sqrt(dx*dx+dy*dy)<p.radius+b.radius){
      p.alive=false;p.deathTime=Date.now();eliminated.push(p);
      const alive=players.filter(x=>x.alive);

      // Online mode: report result
      if(mode==="online"){
        const loserName=p.name;
        const winnerName=alive.find(x=>x.alive)?.name||players.find(x=>x!==p)?.name;
        reportOnlineResult(winnerName,loserName);
        return;
      }

      if(alive.length<=1){
        if(alive.length===1){alive[0].deathTime=Infinity;eliminated.push(alive[0]);}
        finishArena();
      }
      return;
    }
  }
}

async function reportOnlineResult(winnerName,loserName){
  if(!running)return;
  running=false;
  const diff=Math.abs(onlineAccount.elo-(onlineOpponent?.elo||1500));
  const change=Math.max(1,Math.min(15,5+diff/100));
  if(fbReady&&onlineMatchId){
    try{
      await dbUpdate("onlineMatches/"+onlineMatchId,{
        status:"done",winner:winnerName,eloChange:Math.round(change)
      });
    }catch(e){
      // Fallback: handle locally
      handleOnlineResult(winnerName,Math.round(change));
    }
  } else {
    handleOnlineResult(winnerName,Math.round(change));
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  TOURNAMENT MATCH FINISH
// ════════════════════════════════════════════════════════════════════════════
function finishMatch(match,winner,loser){
  match.running=false;
  const diff=loser.elo-winner.elo;
  let change=Math.max(1,Math.min(15,5+diff/100));
  winner.elo+=change;loser.elo-=change;
  winner.lastChange=change;loser.lastChange=-change;
  winner.alive=true;loser.alive=true;
  winner.arenaScore=(winner.arenaScore||0)+1;
  if(winner.stats){winner.stats.wins++;winner.stats.matchesPlayed++;winner.stats.totalEloGain+=change;winner.stats.currentStreak++;if(winner.stats.currentStreak>winner.stats.bestStreak)winner.stats.bestStreak=winner.stats.currentStreak;}
  if(loser.stats){loser.stats.losses++;loser.stats.matchesPlayed++;loser.stats.totalEloLoss+=change;loser.stats.currentStreak=0;}
  matches=matches.filter(m=>m.id!==match.id);
  playerMatchMap.delete(winner.name);playerMatchMap.delete(loser.name);
  if(spectateMatchId===match.id&&!spectateModeActive)spectateMatchId=null;
  if(winner.name==="YOU")showEloAnimation(change);
  if(loser.name==="YOU")showEloAnimation(-change);

  // Spectator winner overlay for this match
  showMatchWinnerBanner(winner.name,match);

  setTimeout(()=>{
    resetAI(winner);resetAI(loser);
    if(humanRemovedFromQueue){
      if(winner.name!=="YOU")waitingQueue.push(winner);
      if(loser.name!=="YOU")waitingQueue.push(loser);
    } else {
      waitingQueue.push(winner);waitingQueue.push(loser);
    }
    seededMatchmaking();
  },2500+Math.random()*1500);
}

// Banner shown on canvas briefly
let matchBanner=null;
function showMatchWinnerBanner(name,match){
  matchBanner={text:"🏆 Winner: "+name,ts:Date.now(),duration:2500};
}

function finishArena(){
  if(mode!=="tournament")running=false;
  if(spawnTimer)clearTimeout(spawnTimer);
  eliminated.sort((a,b)=>b.deathTime-a.deathTime);
  if(rankingMode==="points"){
    const total=eliminated.length;
    for(let i=0;i<eliminated.length;i++){
      const p=eliminated[i];let r=ranking.find(x=>x.name===p.name);
      const pts=total-i;
      if(r)r.points+=pts;
      else ranking.push({name:p.name,color:p.color,points:pts,elo:1500,lastChange:0});
    }
  } else {
    const K=24;
    for(const b of ranking)b.lastChange=0;
    for(let i=0;i<eliminated.length;i++)for(let j=i+1;j<eliminated.length;j++){
      let a=ranking.find(x=>x.name===eliminated[i].name);
      if(!a){a={name:eliminated[i].name,color:eliminated[i].color,points:0,elo:1500,lastChange:0};ranking.push(a);}
      let b=ranking.find(x=>x.name===eliminated[j].name);
      if(!b){b={name:eliminated[j].name,color:eliminated[j].color,points:0,elo:1500,lastChange:0};ranking.push(b);}
      const eA=1/(1+Math.pow(10,(b.elo-a.elo)/400));
      const cA=K*(1-eA),cB=K*(0-(1-eA));
      a.elo+=cA;b.elo+=cB;a.lastChange+=cA;b.lastChange+=cB;
    }
  }
  updateRanking();
  const win=eliminated[0];
  showScreen("gameOver");
  document.getElementById("finalTime").innerHTML="Round "+currentRound+"/"+tournamentRounds+"<br>Winner: "+win.name;
  if(currentRound<tournamentRounds){
    currentRound++;
    setTimeout(()=>{document.getElementById("gameOver").style.display="none";startGame(mode);},15000);
  } else {
    document.getElementById("finalTime").innerHTML+="<br><br><b>TOURNAMENT OVER</b>";
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  RANKING / ELO TABLE
// ════════════════════════════════════════════════════════════════════════════
function updateRanking(){
  let sorted=rankingMode==="elo"?[...ranking].sort((a,b)=>b.elo-a.elo):[...ranking].sort((a,b)=>b.points-a.points);
  let html="<b>TOURNAMENT RANKING</b><br><br>";
  for(let i=0;i<sorted.length;i++)
    html+=rankingMode==="elo"
      ?(i+1)+". "+sorted[i].name+" | "+Math.round(sorted[i].elo)+" ELO ("+(sorted[i].lastChange>=0?"+":"")+Math.round(sorted[i].lastChange)+")<br>"
      :(i+1)+". "+sorted[i].name+" | "+sorted[i].points+" Points<br>";
  document.getElementById("ranking").innerHTML=html;
}

let lastEloRender=0;
function updateEloTable(){
  if(Date.now()-lastEloRender<400)return;
  lastEloRender=Date.now();
  let sorted=[...participants].sort((a,b)=>b.elo-a.elo);
  let html="";
  for(let i=0;i<sorted.length;i++){
    const p=sorted[i];
    const active=matches.some(m=>m.running&&m.players.includes(p));
    const isSpec=p.name==="YOU"&&humanRemovedFromQueue;
    html+=`<div data-pname="${p.name}" style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;padding:3px;border-radius:6px;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background=''" onclick="openProfile('${p.name}')">
      <div style="width:12px;height:12px;border-radius:50%;background:${isSpec?"#aaa":active?"lime":"red"};flex-shrink:0;"></div>
      <div>${i+1}. <b style="color:${p.color||'white'}">${p.name}</b>${isSpec?" 👁":""}<br>${Math.round(p.elo)}
        <span style="color:${p.lastChange>=0?"lime":"red"}">(${p.lastChange>=0?"+":""}${Math.round(p.lastChange)})</span>
      </div></div>`;
  }
  const me=participants.find(p=>p.name==="YOU");
  if(me){
    const myRank=sorted.findIndex(p=>p.name==="YOU")+1;
    const timeEl=document.getElementById("time");
    const recEl=document.getElementById("record");
    const ballsEl=document.getElementById("balls");
    if(timeEl)timeEl.textContent=Math.round(me.elo);
    if(recEl)recEl.textContent=myRank;
    if(ballsEl)ballsEl.textContent=participants.length;
  }
  document.getElementById("eloList").innerHTML=html;
}

  const opponent=inMatch?matches.find(m=>m.running&&m.players.includes(p))?.players.find(x=>x.name!==name):null;

    <div class="prof-row"><span class="prof-label">Rank</span><span class="prof-val">#${rank} / ${participants.length}</span></div>
    <div class="prof-row"><span class="prof-label">ELO</span><span class="prof-val">${Math.round(p.elo)}</span></div>
    <div class="prof-row"><span class="prof-label">Skill Level</span><span class="prof-val">${Math.round(p.skill*100)}%</span></div>
    <div class="prof-row"><span class="prof-label">Matches</span><span class="prof-val">${p.stats.matchesPlayed}</span></div>
    <div class="prof-row"><span class="prof-label">Wins</span><span class="prof-val" style="color:lime">${p.stats.wins}</span></div>
    <div class="prof-row"><span class="prof-label">Losses</span><span class="prof-val" style="color:#ff4444">${p.stats.losses}</span></div>

    <div class="prof-row"><span class="prof-label">ELO Gained</span><span class="prof-val" style="color:lime">+${Math.round(p.stats.totalEloGain)}</span></div>
    <div class="prof-row"><span class="prof-label">ELO Lost</span><span class="prof-val" style="color:#ff4444">-${Math.round(p.stats.totalEloLoss)}</span></div>

function closeProfile(){document.getElementById("profileModal").style.display="none";}

// ════════════════════════════════════════════════════════════════════════════
//  SPECTATOR
// ════════════════════════════════════════════════════════════════════════════
function autoFollowSpectate(){
  if(!spectateModeActive)return;
  if(followMode==="best"){const cur=matches.find(m=>m.id===spectateMatchId&&m.running);if(!cur)pickBestMatch();}
  else if(followMode==="random"){const cur=matches.find(m=>m.id===spectateMatchId&&m.running);if(!cur)pickRandomMatch();}
  else if(followMode==="target"&&targetName){const m=matches.find(m=>m.running&&m.players.some(p=>p.name.toLowerCase()===targetName));if(m)spectateMatchId=m.id;}
}
function pickRandomMatch(){const live=matches.filter(m=>m.running);if(!live.length)return;spectateMatchId=live[Math.floor(Math.random()*live.length)].id;}
function pickBestMatch(){let best=null,bestAvg=-1;for(const m of matches){if(!m.running)continue;const avg=(m.players[0].elo+m.players[1].elo)/2;if(avg>bestAvg){bestAvg=avg;best=m;}}if(best)spectateMatchId=best.id;}
function setTVMode(m){
  followMode=m;
  if(m==="target"){const name=prompt("Enter bot name:");if(!name)return;targetName=name.toLowerCase();}
  if(!humanRemovedFromQueue){humanRemovedFromQueue=true;waitingQueue=waitingQueue.filter(p=>p.name!=="YOU");}
  spectateModeActive=true;spectateMatchId=null;autoFollowSpectate();
  document.getElementById("spectatorInfo").style.display="block";
}
function resumePlay(){
  spectateModeActive=false;followMode="none";spectateMatchId=null;
  document.getElementById("spectatorInfo").style.display="none";
  if(humanRemovedFromQueue){
    humanRemovedFromQueue=false;
    const me=participants.find(p=>p.name==="YOU");
    if(me&&!playerMatchMap.has("YOU")){waitingQueue.push(me);seededMatchmaking();}
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  DRAW
// ════════════════════════════════════════════════════════════════════════════
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // ── TOURNAMENT ──
  if(mode==="tournament"){
    let renderMatch=null;
    if(spectateModeActive&&spectateMatchId)renderMatch=matches.find(m=>m.id===spectateMatchId&&m.running);
    else if(!humanRemovedFromQueue){const dm=playerMatchMap.get("YOU");if(dm&&dm.running)renderMatch=dm;}
    if(!renderMatch&&spectateModeActive)renderMatch=matches.find(m=>m.running);

    if(!renderMatch){
      ctx.fillStyle="white";ctx.font="30px Arial";ctx.textAlign="center";
      ctx.fillText(humanRemovedFromQueue&&!spectateModeActive?"You are watching – choose a TV mode":"Waiting for next match…",canvas.width/2,canvas.height/2);
      document.getElementById("opponentInfo").style.display="none";
      document.getElementById("spectatorInfo").style.display="none";
      return;
    }

    for(const b of renderMatch.balls){ctx.beginPath();ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);ctx.fillStyle="#ff4444";ctx.fill();}
    for(const p of renderMatch.players){
      if(!p.alive)continue;
      ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();
      ctx.fillStyle="white";ctx.font="14px Arial";ctx.textAlign="center";
      ctx.fillText(p.name,p.x,p.y-p.radius-10);
    }

    // Match winner banner
    if(matchBanner&&Date.now()-matchBanner.ts<matchBanner.duration){
      const alpha=1-Math.max(0,(Date.now()-matchBanner.ts-1800)/(matchBanner.duration-1800));
      ctx.save();
      ctx.globalAlpha=alpha;
      ctx.fillStyle="rgba(0,0,0,0.7)";
      ctx.beginPath();ctx.roundRect(canvas.width/2-220,canvas.height/2-50,440,90,16);ctx.fill();
      ctx.fillStyle="#ffd700";ctx.font="bold 38px Arial";ctx.textAlign="center";
      ctx.fillText(matchBanner.text,canvas.width/2,canvas.height/2+14);
      ctx.restore();
    } else if(matchBanner&&Date.now()-matchBanner.ts>=matchBanner.duration){matchBanner=null;}

    // Opponent info
    const oppDiv=document.getElementById("opponentInfo");
    const spectDiv=document.getElementById("spectatorInfo");
    if(!spectateModeActive&&!humanRemovedFromQueue){
      const myMatch=playerMatchMap.get("YOU");
      if(myMatch&&myMatch.running){
        const opp=myMatch.players.find(p=>p.name!=="YOU");
        if(opp){
          const sorted=[...participants].sort((a,b)=>b.elo-a.elo);
          const oppRank=sorted.findIndex(p=>p.name===opp.name)+1;
          oppDiv.style.display="block";
          document.getElementById("opponentText").innerHTML=
            `Opponent: <b style="color:#ffd700">${opp.name}</b><br>Rank: <b>#${oppRank}</b> of ${participants.length}<br>ELO: <b>${Math.round(opp.elo)}</b><br>Skill: <b>${Math.round(opp.skill*100)}%</b>`;
        }
      } else {oppDiv.style.display="none";}
      spectDiv.style.display="none";
    } else {
      oppDiv.style.display="none";
      spectDiv.style.display="block";
      const p1=renderMatch.players[0],p2=renderMatch.players[1];
      document.getElementById("spectatorText").innerHTML=`
        <div style="display:flex;align-items:center;justify-content:center;gap:14px;font-size:14px;line-height:1.2;">
          <div style="text-align:center;min-width:90px;"><b>${p1.name}</b><br>${Math.round(p1.elo)} ELO<br>${Math.round((p1.skill||0)*100)}%</div>
          <div style="font-weight:bold;font-size:16px;opacity:0.8;padding:0 6px;">VS</div>
          <div style="text-align:center;min-width:90px;"><b>${p2.name}</b><br>${Math.round(p2.elo)} ELO<br>${Math.round((p2.skill||0)*100)}%</div>
        </div>`;
    }
    return;
  }

  // ── COIN MODE ──
  if(mode==="coin"){
    for(const c of coins){
      ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
      ctx.fillStyle=c.value>1?"#ffd700":"#ffcc44";
      ctx.shadowColor="#ffaa00";ctx.shadowBlur=c.value>1?18:8;ctx.fill();ctx.shadowBlur=0;
      if(c.value>1){ctx.fillStyle="#a06000";ctx.font="bold 11px Arial";ctx.textAlign="center";ctx.fillText("x3",c.x,c.y+4);}
    }
  }

  // ── BALLS ──
  for(const b of balls){ctx.beginPath();ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);ctx.fillStyle="#ff4444";ctx.fill();}

  // ── PLAYERS ──
  for(const p of players){
    if(!p.alive)continue;
    ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();
    if(mode==="mirror"&&p.name==="Mirror"){
      ctx.beginPath();ctx.arc(p.x,p.y,p.radius+4,0,Math.PI*2);
      ctx.strokeStyle="rgba(255,136,170,0.6)";ctx.lineWidth=2;ctx.setLineDash([5,5]);ctx.stroke();ctx.setLineDash([]);
    }
    ctx.fillStyle="white";ctx.font="14px Arial";ctx.textAlign="center";
    ctx.fillText(p.name,p.x,p.y-p.radius-10);
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  CONTROLS
// ════════════════════════════════════════════════════════════════════════════
function moveSingle(x,y){
  if(spectateModeActive||humanRemovedFromQueue)return;
 if(mode==="online"){
  const me = players.find(p => p.name === onlineAccount.name);
  if(!me) return;

  me.x = x;
  me.y = y;

  dbUpdate(`onlineMatches/${onlineMatchId}/${onlineRole}`, {
    x: me.x,
    y: me.y,
    alive: true
  });

  return;
}
  if(mode==="tournament"){
    const match=playerMatchMap.get("YOU");if(!match||!match.running)return;
    const me=match.players.find(p=>p.name==="YOU");
    if(me){me.x=Math.max(me.radius,Math.min(canvas.width-me.radius,x));me.y=Math.max(me.radius,Math.min(canvas.height-me.radius,y));}
    return;
  }
  
  if(players[0]){
    players[0].x=Math.max(players[0].radius,Math.min(canvas.width-players[0].radius,x));
    players[0].y=Math.max(players[0].radius,Math.min(canvas.height-players[0].radius,y));
  }
}

document.addEventListener("keydown",e=>{keys[e.key.toLowerCase()]=true;});
document.addEventListener("keyup",e=>{keys[e.key.toLowerCase()]=false;});
canvas.addEventListener("mousemove",e=>{if(running&&(mode==="single"||mode==="tournament"||mode==="coin"||mode==="mirror"||mode==="online"))moveSingle(e.clientX,e.clientY);});
canvas.addEventListener("touchmove",e=>{if(running&&(mode==="single"||mode==="tournament"||mode==="coin"||mode==="mirror"||mode==="online"))moveSingle(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
canvas.addEventListener("click",()=>closeProfile());

setInterval(()=>{if(mode==="tournament"&&running&&waitingQueue.length>=2)seededMatchmaking();},1000);

// Online flow entry
document.querySelector('button[onclick="showScreen(\'onlineFlow\')"]')?.addEventListener("click",showScreen_onlineFlow);

// Fix the inline onclick
window.showScreen=function(id){
  if(id==="onlineFlow"){showScreen_onlineFlow();return;}
  const SCREENS=["menu","settings","accountScreen","leaderboardScreen","onlineWait","vsScreen","winnerOverlay","gameOver"];
  SCREENS.forEach(s=>{const el=document.getElementById(s);if(el)el.style.display=(s===id)?"flex":"none";});
  document.getElementById("homeBtn").style.display=(id==="menu"||id==="settings"||id==="accountScreen"||id==="leaderboardScreen")?"none":"block";
};

loop();
