<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finger Dodge</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#111;font-family:Arial,sans-serif;}
canvas{display:block;touch-action:none;}

#ui{
    position:absolute;top:20px;left:20px;color:white;
    font-size:20px;font-weight:bold;
}

#menu{
    position:absolute;inset:0;display:flex;
    flex-direction:column;justify-content:center;
    align-items:center;background:#111;color:white;
}

h1{font-size:50px;margin-bottom:20px;}

button{
    padding:15px 35px;font-size:22px;
    border:none;border-radius:12px;cursor:pointer;
    margin:10px;
}

#gameOver{
    position:absolute;inset:0;background:rgba(0,0,0,0.8);
    display:none;flex-direction:column;
    justify-content:center;align-items:center;color:white;
}

#settings{
display:none;
position:absolute;
inset:0;
background:#111;
color:white;
flex-direction:column;
justify-content:center;
align-items:center;
}
</style>
</head>

<body>

<div id="ui">
Zeit: <span id="time">0</span>s<br>
Rekord: <span id="record">0</span>s<br>
Bälle: <span id="balls">0</span><br>
Modus: <span id="mode">-</span>
</div>

<div id="menu">
<h1>Finger Dodge</h1>
<button onclick="startGame('single')">Singleplayer</button>
<button onclick="startGame('multi')">Multiplayer (lokal)</button>
<button onclick="startGame('ai')">AI Spectate</button>
<button onclick="openSettings()">Settings</button>
<button onclick="resetRecord()">Rekord zurücksetzen</button>
</div>

<div id="settings">
<h2>Settings</h2>

<label>Start-Bälle</label>
<input id="startBalls" type="number" value="3" min="1" max="20">

<br><br>

<label>Spawn-Zeit</label>
<input id="spawnTime" type="number" value="5" min="1" max="30">

<br><br>

<label>Ball-Speed</label>
<select id="ballSpeed">
<option value="0.5">Langsam</option>
<option value="1" selected>Normal</option>
<option value="1.5">Schnell</option>
<option value="2">Extrem</option>
</select>

<br><br>

<label>Spielergröße</label>
<input id="playerSize" type="number" value="18" min="5" max="50">

<br><br>

<button onclick="saveSettings()">Speichern</button>
</div>

<div id="gameOver">
<h2>GAME OVER</h2>
<p>Überlebt: <span id="finalTime">0</span>s</p>
<button onclick="restartGame()">Nochmal</button>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ---------------- STATE ----------------
let balls = [];
let players = [];
let running = false;
let startTime = 0;
let spawnTimer = null;
let mode = "single";

let startBallCount = 3;
let spawnDelay = 5000;
let ballSpeedMultiplier = 1;
let playerRadiusSetting = 18;

// ---------------- RECORD ----------------
let record = localStorage.getItem("fingerDodgeRecord") || 0;
document.getElementById("record").textContent = record;

// ---------------- PLAYER FACTORY ----------------
function createPlayer(x,y,color){
return { x,y,radius:playerRadiusSetting,color };
}

// ---------------- INPUT ----------------
const keys = {};
document.addEventListener("keydown",(e)=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",(e)=>keys[e.key.toLowerCase()]=false);

// ---------------- UI ----------------
function openSettings(){
document.getElementById("menu").style.display="none";
document.getElementById("settings").style.display="flex";
}

function saveSettings(){
startBallCount = Number(document.getElementById("startBalls").value);
spawnDelay = Number(document.getElementById("spawnTime").value)*1000;
ballSpeedMultiplier = Number(document.getElementById("ballSpeed").value);
playerRadiusSetting = Number(document.getElementById("playerSize").value);

document.getElementById("settings").style.display="none";
document.getElementById("menu").style.display="flex";
}

// ---------------- BALLS ----------------
function createBall(){
const r = 15 + Math.random()*20;
let x,y;

do{
x = Math.random()*(canvas.width-2*r)+r;
y = Math.random()*(canvas.height-2*r)+r;
}while(false);

balls.push({
x,y,radius:r,
vx:(Math.random()*4+2)*ballSpeedMultiplier*(Math.random()<0.5?-1:1),
vy:(Math.random()*4+2)*ballSpeedMultiplier*(Math.random()<0.5?-1:1)
});

document.getElementById("balls").textContent = balls.length;
}

// ---------------- AI ----------------
function updateAI(p){

    // ---------------- 1. Zentrum ----------------
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    // ---------------- 2. Gefahrenvektor (PREDICTION) ----------------
    let dangerX = 0;
    let dangerY = 0;

    for(const b of balls){

        // Distanz
        const dx = b.x - p.x;
        const dy = b.y - p.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        // Richtung Ball
        let nx = dx / (dist || 1);
        let ny = dy / (dist || 1);

        // 🧠 Geschwindigkeit des Balls einbeziehen (Prediction)
        const futureX = b.vx * 10;
        const futureY = b.vy * 10;

        const fx = (b.x + futureX) - p.x;
        const fy = (b.y + futureY) - p.y;

        const fDist = Math.sqrt(fx*fx + fy*fy) || 1;

        // Gefahr = Nähe + Geschwindigkeit
        const danger = 1 / (dist * 0.6 + 20);

        dangerX += (fx / fDist) * danger;
        dangerY += (fy / fDist) * danger;
    }

    // ---------------- 3. Zentrum-Anziehung ----------------
    let centerX = cx - p.x;
    let centerY = cy - p.y;

    const centerLen = Math.sqrt(centerX*centerX + centerY*centerY) || 1;
    centerX /= centerLen;
    centerY /= centerLen;

    // ---------------- 4. Separation (Spieler Abstand) ----------------
    let sepX = 0, sepY = 0;

    for(const other of players){
        if(other === p) continue;

        const dx = p.x - other.x;
        const dy = p.y - other.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < 70 && dist > 0){
            sepX += dx / dist;
            sepY += dy / dist;
        }
    }

    const sepLen = Math.sqrt(sepX*sepX + sepY*sepY) || 1;
    sepX /= sepLen;
    sepY /= sepLen;

    // ---------------- 5. Soft Anti-Corner ----------------
    let cornerX = 0;
    let cornerY = 0;

    const margin = 180;

    if(p.x < margin) cornerX += 1;
    if(p.x > canvas.width - margin) cornerX -= 1;
    if(p.y < margin) cornerY += 1;
    if(p.y > canvas.height - margin) cornerY -= 1;

    const cornerLen = Math.sqrt(cornerX*cornerX + cornerY*cornerY) || 1;
    cornerX /= cornerLen;
    cornerY /= cornerLen;

    // ---------------- 6. INTELLIGENTE GEWICHTUNG ----------------
    const dangerStrength = 6.5;   // wichtigste Komponente
    const centerStrength = 2.2;   // nicht zu stark sonst Stack
    const sepStrength = 8.5;      // verhindert Überlappung
    const cornerStrength = 3.5;   // anti stuck

    // ---------------- 7. Bewegung kombinieren ----------------
    let vx =
        (-dangerX * dangerStrength) +
        (centerX * centerStrength) +
        (sepX * sepStrength) +
        (cornerX * cornerStrength);

    let vy =
        (-dangerY * dangerStrength) +
        (centerY * centerStrength) +
        (sepY * sepStrength) +
        (cornerY * cornerStrength);

    // ---------------- 8. Smooth Movement ----------------
    const speed = 4.3;
    const len = Math.sqrt(vx*vx + vy*vy) || 1;

    p.x += (vx / len) * speed;
    p.y += (vy / len) * speed;

    // ---------------- 9. Micro randomness (human feel) ----------------
    p.x += (Math.random() - 0.5) * 0.4;
    p.y += (Math.random() - 0.5) * 0.4;
}
// ---------------- START ----------------
function startGame(selectedMode){
mode = selectedMode;
document.getElementById("mode").textContent = mode;

document.getElementById("menu").style.display="none";
document.getElementById("gameOver").style.display="none";

balls = [];
players = [];

running = true;
startTime = Date.now();

if(mode==="single"){
players.push(createPlayer(300,300,"#00ff88"));
}

if(mode==="multi"){
players.push(createPlayer(200,200,"#00ff88"));
players.push(createPlayer(400,200,"#4488ff"));
}

if(mode==="ai"){
players.push(createPlayer(200,200,"#00ff88"));
players.push(createPlayer(400,200,"#4488ff"));
players.push(createPlayer(600,200,"#ffcc00"));
players.push(createPlayer(800,200,"#ff44aa"));
}

for(let i=0;i<startBallCount;i++) createBall();
spawnLoop();
}

// ---------------- SPAWN ----------------
function spawnLoop(){
if(!running) return;
spawnTimer=setTimeout(()=>{
createBall();
spawnLoop();
},spawnDelay);
}

// ---------------- RESTART ----------------
function restartGame(){
if(spawnTimer) clearTimeout(spawnTimer);
startGame(mode);
}

// ---------------- RECORD ----------------
function resetRecord(){
if(confirm("Rekord löschen?")){
record=0;
localStorage.setItem("fingerDodgeRecord",0);
document.getElementById("record").textContent=0;
}
}

// ---------------- GAME OVER ----------------
function gameOver(){
running=false;

let survived=Math.floor((Date.now()-startTime)/1000);

if(survived>record){
record=survived;
localStorage.setItem("fingerDodgeRecord",record);
document.getElementById("record").textContent=record;
}

document.getElementById("finalTime").textContent=survived;
document.getElementById("gameOver").style.display="flex";
}

// ---------------- UPDATE ----------------
function update(){
if(!running) return;

document.getElementById("time").textContent =
Math.floor((Date.now()-startTime)/1000);

// MOVEMENT
if(mode==="multi"){
if(keys["w"]) players[0].y-=5;
if(keys["s"]) players[0].y+=5;
if(keys["a"]) players[0].x-=5;
if(keys["d"]) players[0].x+=5;

if(keys["arrowup"]) players[1].y-=5;
if(keys["arrowdown"]) players[1].y+=5;
if(keys["arrowleft"]) players[1].x-=5;
if(keys["arrowright"]) players[1].x+=5;
}

if(mode==="ai"){
for(const p of players) updateAI(p);
}

// bounds
for(const p of players){
p.x=Math.max(p.radius,Math.min(canvas.width-p.radius,p.x));
p.y=Math.max(p.radius,Math.min(canvas.height-p.radius,p.y));
}

// balls
for(const b of balls){
b.x+=b.vx;
b.y+=b.vy;

if(b.x-b.radius<0||b.x+b.radius>canvas.width)b.vx*=-1;
if(b.y-b.radius<0||b.y+b.radius>canvas.height)b.vy*=-1;
}

// collision
for(const p of players){
check(p);
}
}

// ---------------- COLLISION ----------------
function check(p){
for(const b of balls){
let dx=p.x-b.x;
let dy=p.y-b.y;
let d=Math.sqrt(dx*dx+dy*dy);
if(d<p.radius+b.radius){
gameOver();
}
}
}

// ---------------- DRAW ----------------
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(const b of balls){
ctx.beginPath();
ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
ctx.fillStyle="#ff4444";
ctx.fill();
}

for(const p of players){
ctx.beginPath();
ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();
}
}

// ---------------- LOOP ----------------
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

// ---------------- SINGLE CONTROL ----------------
function moveSingle(x,y){
players[0].x=x;
players[0].y=y;
}

canvas.addEventListener("mousemove",(e)=>{
if(mode==="single"&&running)moveSingle(e.clientX,e.clientY);
});

canvas.addEventListener("touchmove",(e)=>{
if(mode==="single"&&running)
moveSingle(e.touches[0].clientX,e.touches[0].clientY);
});

</script>
</body>
</html>
