<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finger Dodge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#111;font-family:Arial,sans-serif;}
canvas{display:block;touch-action:none;}
#ui{position:absolute;top:20px;left:20px;color:white;font-size:20px;font-weight:bold;}
#menu{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#111;color:white;}
h1{font-size:50px;margin-bottom:20px;}
button{padding:15px 35px;font-size:22px;border:none;border-radius:12px;cursor:pointer;margin:10px;}
#gameOver{position:absolute;inset:0;background:rgba(0,0,0,0.8);display:none;flex-direction:column;justify-content:center;align-items:center;color:white;}
#settings{display:none;position:absolute;inset:0;background:#111;color:white;flex-direction:column;justify-content:center;align-items:center;}
#spectatorInfo{position:absolute;bottom:20px;left:20px;color:white;font-size:18px;background:rgba(0,0,0,0.6);padding:15px;border-radius:10px;display:none;}

/* ELO-Ergebnis Animation */
#eloResult{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%) scale(0);
    font-size:80px;
    font-weight:bold;
    text-align:center;
    pointer-events:none;
    opacity:0;
    text-shadow:0 0 30px currentColor;
    transition:none;
    z-index:100;
}
@keyframes eloPopIn{
    0%{transform:translate(-50%,-50%) scale(0);opacity:0;}
    30%{transform:translate(-50%,-50%) scale(1.3);opacity:1;}
    60%{transform:translate(-50%,-50%) scale(1);opacity:1;}
    80%{transform:translate(-50%,-60%) scale(1);opacity:1;}
    100%{transform:translate(-50%,-80%) scale(0.8);opacity:0;}
}
</style>
</head>
<body>

<div id="ui">
Zeit: <span id="time">0</span>s<br>
Rekord: <span id="record">0</span>s<br>
Bälle: <span id="balls">0</span><br>
Modus: <span id="mode">-</span>
</div>

<div id="eloTable" style="position:absolute;top:20px;right:20px;background:rgba(0,0,0,0.6);padding:10px;color:white;min-width:220px;max-height:70vh;overflow-y:auto;border-radius:10px;display:none;">
<b>ELO LIVE</b>
<div id="eloList"></div>
<div style="margin-top:10px;display:flex;flex-direction:column;gap:8px;">
    <button onclick="setTVMode('best')">BEST TV</button>
    <button onclick="setTVMode('random')">RANDOM TV</button>
    <button onclick="setTVMode('target')">TARGET TV</button>
    <button onclick="resumePlay()">▶ PLAY RESUME</button>
</div>
</div>

<div id="menu">
<h1>Finger Dodge</h1>
<button onclick="startGame('single')">Singleplayer</button>
<button onclick="startGame('multi')">Multiplayer (lokal)</button>
<button onclick="startGame('ai')">AI Spectate</button>
<button onclick="startGame('tournament')">1vs1 Tournament</button>
<button onclick="openSettings()">Settings</button>
<button onclick="resetRecord()">Rekord zurücksetzen</button>
</div>

<div id="settings">
<h2>Settings</h2>
<label>Start-Bälle</label>
<input id="startBalls" type="number" value="3" min="1" max="20">
<br><br>
<label>Spawn-Zeit</label>
<input id="spawnTime" type="number" value="5" min="1" max="30">
<br><br>
<label>Ball-Speed</label>
<select id="ballSpeed">
<option value="0.3">Langsam</option>
<option value="0.5" selected>Normal</option>
<option value="0.8">Schnell</option>
<option value="1">Extrem</option>
</select>
<br><br>
<label>AI Bots</label>
<input id="botCount" type="number" value="10" min="2">
<br><br>
<label>Ranking-System</label>
<select id="rankingMode">
<option value="points" selected>Punkte</option>
<option value="elo">ELO</option>
</select>
<br><br>
<label>Spielergröße</label>
<input id="playerSize" type="number" value="18" min="5" max="50">
<br><br>
<button onclick="saveSettings()">Speichern</button>
</div>

<div id="gameOver">
<h2>GAME OVER</h2>
<p>Überlebt: <span id="finalTime">0</span>s</p>
<button onclick="restartGame()">Nochmal</button>
<div id="ranking" style="position:absolute;top:20px;right:20px;color:white;font-size:18px;text-align:left;max-height:90vh;overflow:auto;"></div>
</div>

<!-- ELO Ergebnis Overlay -->
<div id="eloResult"></div>

<canvas id="game"></canvas>

<!-- Gegner-Info: immer sichtbar wenn DU im Match ist -->
<div id="opponentInfo" style="
    position:absolute;bottom:20px;left:20px;
    color:white;font-size:18px;
    background:rgba(0,0,0,0.65);
    padding:15px 20px;border-radius:12px;
    display:none;line-height:1.6;
    border:1px solid rgba(255,255,255,0.15);
">
    <div id="opponentText"></div>
</div>

<!-- Spectator-Overlay: nur sichtbar im TV-Modus -->
<div id="spectatorInfo" style="
    position:absolute;bottom:20px;left:20px;
    color:white;font-size:18px;
    background:rgba(0,0,0,0.65);
    padding:15px 20px;border-radius:12px;
    display:none;line-height:1.6;
    border:1px solid rgba(255,165,0,0.4);
">
<b>👁 Spectator Mode</b><br>
<div id="spectatorText"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// STATE
let balls = [], players = [], ranking = [], eliminated = [];
let running = false, startTime = 0, spawnTimer = null;
let mode = "single";
let tournamentRounds = 100, currentRound = 1;
let startBallCount = 3, spawnDelay = 5000, ballSpeedMultiplier = 0.5;
let playerRadiusSetting = 18, aiBotCount = 10, rankingMode = "points";
let participants = [], matches = [], waitingQueue = [];
let playerMatchMap = new Map(), recentOpponents = new Map();
const HUMAN_NAME = "DU";
let keys = {};

// Spectator state – alles standardmäßig AUS
let spectateModeActive = false;   // true nur wenn User einen TV-Button drückt
let spectateMatchId = null;
let followMode = "none";          // "best" | "random" | "target" | "none"
let targetName = null;
let humanRemovedFromQueue = false; // DU wurde aus Turnier entfernt

let record = localStorage.getItem("fingerDodgeRecord") || 0;
document.getElementById("record").textContent = record;

// ─── ELO-Animations-Overlay ───────────────────────────────────────────────────
function showEloAnimation(change){
    const el = document.getElementById("eloResult");
    const won = change > 0;
    el.style.animation = "none";
    el.offsetHeight; // reflow
    el.style.color = won ? "#00ff88" : "#ff4444";
    el.style.textShadow = `0 0 40px ${won ? "#00ff88" : "#ff4444"}`;
    el.innerHTML = (won ? "✓ +" : "✗ ") + Math.round(Math.abs(change)) + " ELO<br>"
        + (won ? '<span style="font-size:40px">GEWONNEN</span>' : '<span style="font-size:40px">VERLOREN</span>');
    el.style.animation = "eloPopIn 2.5s ease forwards";
}

// ─── autoFollowSpectate ───────────────────────────────────────────────────────
function autoFollowSpectate(){
    if(!spectateModeActive) return;
    if(followMode === "best"){
        pickBestMatch();
    } else if(followMode === "random"){
        const cur = matches.find(m => m.id === spectateMatchId && m.running);
        if(!cur) pickRandomMatch();
    } else if(followMode === "target" && targetName){
        const m = matches.find(m =>
            m.running && m.players.some(p => p.name.toLowerCase() === targetName)
        );
        if(m) spectateMatchId = m.id;
    }
}

// ─── Player factory ───────────────────────────────────────────────────────────
function createPlayer(x, y, color, name){
    const skill = Math.random();
    return {
        x, y, radius: playerRadiusSetting, color, name,
        points: 0, elo: 1500, lastChange: 0, alive: true, games: 0,
        skill,
        speed: 1.5 + skill * 8,
        reaction: 0.3 + skill * 4,
        awareness: 50 + skill * 95,
        randomness: (1 - skill) * 5,
        dodgePower: 0.3 + skill * 4,
        targetX: null, targetY: null,
        lastVX: 0, lastVY: 0
    };
}

// ─── Settings ─────────────────────────────────────────────────────────────────
function openSettings(){
    document.getElementById("menu").style.display = "none";
    document.getElementById("settings").style.display = "flex";
}
function saveSettings(){
    startBallCount   = Number(document.getElementById("startBalls").value);
    spawnDelay       = Number(document.getElementById("spawnTime").value) * 1000;
    ballSpeedMultiplier = Number(document.getElementById("ballSpeed").value);
    playerRadiusSetting = Number(document.getElementById("playerSize").value);
    aiBotCount       = Number(document.getElementById("botCount").value);
    rankingMode      = document.getElementById("rankingMode").value;
    document.getElementById("settings").style.display = "none";
    document.getElementById("menu").style.display = "flex";
}

// ─── Ball creation ────────────────────────────────────────────────────────────
function createBallForMatch(match){
    const r = 15 + Math.random() * 20;
    let x, y, valid = false;
    while(!valid){
        x = Math.random() * (canvas.width - r*2) + r;
        y = Math.random() * (canvas.height - r*2) + r;
        valid = true;
        for(const p of match.players){
            if(!p.alive) continue;
            const dx = p.x-x, dy = p.y-y;
            if(Math.sqrt(dx*dx+dy*dy) < p.radius+r+80){ valid=false; break; }
        }
    }
    const spd = 5 + Math.random()*6, ang = Math.random()*Math.PI*2;
    match.balls.push({ x, y, radius:r,
        vx: Math.cos(ang)*spd*ballSpeedMultiplier,
        vy: Math.sin(ang)*spd*ballSpeedMultiplier });
}
function createBall(){
    const r = 15 + Math.random()*20;
    let x, y, valid = false;
    while(!valid){
        x = Math.random()*(canvas.width-r*2)+r;
        y = Math.random()*(canvas.height-r*2)+r;
        valid = true;
        for(const p of players){
            const dx=p.x-x, dy=p.y-y;
            if(Math.sqrt(dx*dx+dy*dy)<p.radius+r+80){ valid=false; break; }
        }
    }
    const spd = 5+Math.random()*6, ang = Math.random()*Math.PI*2;
    balls.push({ x, y, radius:r,
        vx: Math.cos(ang)*spd*ballSpeedMultiplier,
        vy: Math.sin(ang)*spd*ballSpeedMultiplier });
}
function spawnLoop(){
    spawnTimer = setTimeout(() => { if(running){ createBall(); spawnLoop(); } }, spawnDelay);
}

// ─── AI ───────────────────────────────────────────────────────────────────────
function updateAI(p, activeBalls=balls){
    let danger = false;
    for(const b of activeBalls){
        const dx=p.x-b.x, dy=p.y-b.y;
        if(Math.sqrt(dx*dx+dy*dy) < p.awareness){ danger=true; break; }
    }
    if(!danger){
        if(p.targetX===null || Math.random()<0.02){
            p.targetX = Math.random()*canvas.width;
            p.targetY = Math.random()*canvas.height;
        }
    }
    let mx=p.targetX-p.x, my=p.targetY-p.y;
    const md=Math.sqrt(mx*mx+my*my)||1; mx/=md; my/=md;
    let ax=0, ay=0;
    const wm=140;
    if(p.x<wm) ax+=(wm-p.x)*0.03;
    if(p.x>canvas.width-wm) ax-=(p.x-(canvas.width-wm))*0.03;
    if(p.y<wm) ay+=(wm-p.y)*0.03;
    if(p.y>canvas.height-wm) ay-=(p.y-(canvas.height-wm))*0.03;
    for(const b of activeBalls){
        const dx=p.x-b.x, dy=p.y-b.y;
        const dist=Math.sqrt(dx*dx+dy*dy)||1;
        if(dist<p.awareness){
            const str=Math.max(0,(p.awareness-dist)/p.awareness);
            const f=str*p.dodgePower*2;
            ax+=(dx/dist)*f; ay+=(dy/dist)*f;
        }
    }
    let vx=mx*4+ax*10, vy=my*4+ay*10;
    vx+=(Math.random()-0.5)*p.randomness;
    vy+=(Math.random()-0.5)*p.randomness;
    const len=Math.sqrt(vx*vx+vy*vy)||1;
    p.x+=(vx/len)*p.speed; p.y+=(vy/len)*p.speed;
    p.x=Math.max(p.radius,Math.min(canvas.width-p.radius,p.x));
    p.y=Math.max(p.radius,Math.min(canvas.height-p.radius,p.y));
    p.lastVX=vx; p.lastVY=vy;
}

function createMatch(p1,p2){
    return { id:crypto.randomUUID(), players:[p1,p2], balls:[], running:true,
             startTime:Date.now(), lastSpawn:Date.now(), spawnDelay };
}
function resetAI(p){ p.targetX=null; p.targetY=null; }
function resetAIState(p){
    p.targetX=null; p.targetY=null; p.deathTime=0;
    p.alive=true; p.lastVX=0; p.lastVY=0;
}

// ─── Start ────────────────────────────────────────────────────────────────────
function startGame(selectedMode){
    waitingQueue=[]; matches=[]; playerMatchMap.clear();
    mode = selectedMode;

    // Spectator komplett zurücksetzen
    spectateModeActive = false;
    spectateMatchId = null;
    followMode = "none";
    targetName = null;
    humanRemovedFromQueue = false;

    document.getElementById("eloTable").style.display = (mode==="tournament") ? "block" : "none";
    document.getElementById("spectatorInfo").style.display = "none";
    document.getElementById("mode").textContent = mode;

    if(mode==="tournament"){
        document.getElementById("time").parentNode.innerHTML =
            `ELO: <span id="time">1500</span><br>Platz: <span id="record">1</span><br>Spieler: <span id="balls">0</span>`;
    }

    document.getElementById("menu").style.display = "none";
    document.getElementById("gameOver").style.display = "none";
    balls=[]; players=[]; eliminated=[];
    running=true; startTime=Date.now();

    if(mode!=="multi" && ranking.length===0){
        for(let i=0;i<aiBotCount;i++)
            ranking.push(createPlayer(0,0,`hsl(${i*360/aiBotCount},100%,50%)`,"Bot "+(i+1)));
    }

    if(mode==="single"){
        if(!ranking.find(x=>x.name==="Spieler"))
            ranking.push({name:"Spieler",color:"#00ff88",points:0,elo:1500,lastChange:0});
        players.push(createPlayer(canvas.width/2,canvas.height/2,"#00ff88","Spieler"));
        for(const bot of ranking){
            if(bot.name==="Spieler") continue;
            const nb=createPlayer(Math.random()*canvas.width,Math.random()*canvas.height,bot.color,bot.name);
            nb.elo=bot.elo; nb.points=bot.points; nb.lastChange=bot.lastChange;
            players.push(nb);
        }
    } else if(mode==="multi"){
        players.push(createPlayer(200,200,"#00ff88","Spieler 1"),createPlayer(400,200,"#4488ff","Spieler 2"));
        for(let i=0;i<aiBotCount;i++)
            players.push(createPlayer(Math.random()*canvas.width,Math.random()*canvas.height,`hsl(${i*360/aiBotCount},100%,50%)`,"Bot "+(i+1)));
    } else if(mode==="tournament"){
        startTournament(); return;
    } else if(mode==="ai"){
        for(const bot of ranking){
            const nb=createPlayer(Math.random()*canvas.width,Math.random()*canvas.height,bot.color,bot.name);
            nb.elo=bot.elo; nb.points=bot.points; nb.lastChange=bot.lastChange;
            players.push(nb);
        }
    }

    for(let i=0;i<startBallCount;i++) createBall();
    spawnLoop(); updateRanking();
}

function startTournament(){
    running=true; matches=[]; participants=[]; waitingQueue=[];
    humanRemovedFromQueue=false;

    participants.push(createPlayer(canvas.width/2,canvas.height/2,"#00ff88","DU"));
    for(let i=0;i<aiBotCount;i++){
        participants.push(createPlayer(
            Math.random()*canvas.width, Math.random()*canvas.height,
            `hsl(${i*360/aiBotCount},100%,50%)`, "Bot "+(i+1)
        ));
    }
    waitingQueue = [...participants];
    seededMatchmaking();
}

// ─── Matchmaking ──────────────────────────────────────────────────────────────
function seededMatchmaking(){
    if(waitingQueue.length < 2) return;

    let sorted = [...waitingQueue].sort((a,b)=>b.elo-a.elo);
    waitingQueue=[];

    while(sorted.length >= 2){
        const p1=sorted.shift();
        let bestIdx=0, bestDiff=Infinity;
        const cap=Math.min(3,sorted.length);
        for(let i=0;i<cap;i++){
            const cand=sorted[i];
            const last=recentOpponents.get(p1.name);
            if(last===cand.name && cap>1) continue;
            const diff=Math.abs(cand.elo-p1.elo);
            if(diff<bestDiff){ bestDiff=diff; bestIdx=i; }
        }
        const p2=sorted.splice(bestIdx,1)[0];
        recentOpponents.set(p1.name,p2.name);
        recentOpponents.set(p2.name,p1.name);

        const match=createMatch(p1,p2);
        setupMatch(match);
        matches.push(match);
        playerMatchMap.set(p1.name,match);
        playerMatchMap.set(p2.name,match);
    }
    waitingQueue.push(...sorted);
}

function setupMatch(match){
    const [p1,p2]=match.players;
    for(const p of match.players){ resetAIState(p); p.alive=true; }
    p1.x=canvas.width*0.3; p1.y=canvas.height*0.5;
    p2.x=canvas.width*0.7; p2.y=canvas.height*0.5;
    match.balls=[]; match.lastSpawn=Date.now(); match.spawnDelay=spawnDelay;
    for(let i=0;i<startBallCount;i++) createBallForMatch(match);

    // Kein automatisches Spectating – spectateMatchId wird NUR über TV-Buttons gesetzt
    // Aber: wenn DU in diesem Match ist und noch kein Match angezeigt wird, zeig DUs Match
    if(!spectateModeActive){
        const humanHere = match.players.some(p=>p.name==="DU");
        if(humanHere) spectateMatchId = match.id;
    }
}

// ─── Game loop ────────────────────────────────────────────────────────────────
function loop(){ update(); draw(); requestAnimationFrame(loop); }

function restartGame(){
    if(spawnTimer) clearTimeout(spawnTimer);
    const keepRound=currentRound;
    startGame(mode); currentRound=keepRound;
}
function resetRecord(){
    if(confirm("Rekord löschen?")){
        record=0; localStorage.setItem("fingerDodgeRecord",0);
        document.getElementById("record").textContent=0;
    }
}
function gameOver(){
    running=false;
    let survived=Math.floor((Date.now()-startTime)/1000);
    if(survived>record){ record=survived; localStorage.setItem("fingerDodgeRecord",record); document.getElementById("record").textContent=record; }
    document.getElementById("finalTime").textContent=survived;
    document.getElementById("gameOver").style.display="flex";
}

function update(){
    if(!running) return;
    if(mode==="tournament"){ updateTournament(); return; }

    document.getElementById("time").textContent=Math.floor((Date.now()-startTime)/1000);

    if(mode==="multi"){
        if(keys["w"]) players[0].y-=5; if(keys["s"]) players[0].y+=5;
        if(keys["a"]) players[0].x-=5; if(keys["d"]) players[0].x+=5;
        if(keys["arrowup"]) players[1].y-=5; if(keys["arrowdown"]) players[1].y+=5;
        if(keys["arrowleft"]) players[1].x-=5; if(keys["arrowright"]) players[1].x+=5;
    }

    for(const p of players)
        if(p.alive && p.name!==HUMAN_NAME && p.name.startsWith("Bot")) updateAI(p,balls);

    for(const p of players){
        p.x=Math.max(p.radius,Math.min(canvas.width-p.radius,p.x));
        p.y=Math.max(p.radius,Math.min(canvas.height-p.radius,p.y));
    }
    for(const b of balls){
        b.x+=b.vx; b.y+=b.vy;
        if(b.x-b.radius<0||b.x+b.radius>canvas.width){ b.vx*=-1; b.x=Math.max(b.radius,Math.min(canvas.width-b.radius,b.x)); }
        if(b.y-b.radius<0||b.y+b.radius>canvas.height){ b.vy*=-1; b.y=Math.max(b.radius,Math.min(canvas.height-b.radius,b.y)); }
    }
    for(const p of players) check(p);
}

function updateTournament(){
    for(const match of [...matches]){ if(match.running) updateMatch(match); }
    matches=matches.filter(m=>m.running);
    updateEloTable();
    autoFollowSpectate();
}

function updateMatch(match){
    if(!match.running) return;
    for(const p of match.players)
        if(p.alive && p.name.startsWith("Bot")) updateAI(p,match.balls);

    for(const b of match.balls){
        b.x+=b.vx; b.y+=b.vy;
        if(b.x-b.radius<0||b.x+b.radius>canvas.width) b.vx*=-1;
        if(b.y-b.radius<0||b.y+b.radius>canvas.height) b.vy*=-1;
    }
    const now=Date.now();
    if(now-match.lastSpawn>=match.spawnDelay){ createBallForMatch(match); match.lastSpawn=now; }

    for(const p of match.players){
        if(!p.alive) continue;
        for(const b of match.balls){
            const dx=p.x-b.x, dy=p.y-b.y;
            if(Math.sqrt(dx*dx+dy*dy)<p.radius+b.radius){
                p.alive=false;
                const alive=match.players.filter(x=>x.alive);
                if(alive.length<=1){
                    match.running=false;
                    const winner=alive[0]||match.players.find(x=>x!==p);
                    finishMatch(match,winner,p);
                    return;
                }
            }
        }
    }
}

function check(p){
    if(!p.alive) return;
    for(const b of balls){
        const dx=p.x-b.x, dy=p.y-b.y;
        if(Math.sqrt(dx*dx+dy*dy)<p.radius+b.radius){
            p.alive=false; p.deathTime=Date.now(); eliminated.push(p);
            const alive=players.filter(x=>x.alive);
            if(alive.length<=1){
                if(alive.length===1){ alive[0].deathTime=Infinity; eliminated.push(alive[0]); }
                finishArena();
            }
            return;
        }
    }
}

// ─── Match beenden ────────────────────────────────────────────────────────────
function finishMatch(match, winner, loser){
    match.running=false;
    const diff=loser.elo-winner.elo;
    let change=Math.max(1,Math.min(15,5+diff/100));
    winner.elo+=change; loser.elo-=change;
    winner.lastChange=change; loser.lastChange=-change;
    winner.alive=true; loser.alive=true;
    winner.arenaScore=(winner.arenaScore||0)+1;

    matches=matches.filter(m=>m.id!==match.id);
    playerMatchMap.delete(winner.name);
    playerMatchMap.delete(loser.name);

    // spectateMatchId freigeben (sofern nicht TV-Modus)
    if(spectateMatchId===match.id && !spectateModeActive) spectateMatchId=null;

    // ELO-Animation für DU
    if(winner.name==="DU") showEloAnimation(change);
    if(loser.name==="DU")  showEloAnimation(-change);

    setTimeout(()=>{
        resetAI(winner); resetAI(loser);

        // Wenn DU aus dem Turnier entfernt wurde (Spectator), nicht zurück in Queue
        if(humanRemovedFromQueue){
            if(winner.name!=="DU") waitingQueue.push(winner);
            if(loser.name!=="DU")  waitingQueue.push(loser);
        } else {
            waitingQueue.push(winner);
            waitingQueue.push(loser);
        }
        seededMatchmaking();
    }, 2500+Math.random()*1500);
}

function finishArena(){
    if(mode!=="tournament") running=false;
    if(spawnTimer) clearTimeout(spawnTimer);
    eliminated.sort((a,b)=>b.deathTime-a.deathTime);
    if(rankingMode==="points"){
        const total=eliminated.length;
        for(let i=0;i<eliminated.length;i++){
            const p=eliminated[i]; let r=ranking.find(x=>x.name===p.name);
            const pts=total-i;
            if(r) r.points+=pts;
            else ranking.push({name:p.name,color:p.color,points:pts,elo:1500,lastChange:0});
        }
    } else {
        const K=24;
        for(const b of ranking) b.lastChange=0;
        for(let i=0;i<eliminated.length;i++) for(let j=i+1;j<eliminated.length;j++){
            let a=ranking.find(x=>x.name===eliminated[i].name);
            if(!a){ a={name:eliminated[i].name,color:eliminated[i].color,points:0,elo:1500,lastChange:0}; ranking.push(a); }
            let b=ranking.find(x=>x.name===eliminated[j].name);
            if(!b){ b={name:eliminated[j].name,color:eliminated[j].color,points:0,elo:1500,lastChange:0}; ranking.push(b); }
            const eA=1/(1+Math.pow(10,(b.elo-a.elo)/400));
            const cA=K*(1-eA), cB=K*(0-(1-eA));
            a.elo+=cA; b.elo+=cB; a.lastChange+=cA; b.lastChange+=cB;
        }
    }
    updateRanking();
    const win=eliminated[0];
    document.getElementById("gameOver").style.display="flex";
    document.getElementById("finalTime").innerHTML="Runde "+currentRound+"/"+tournamentRounds+"<br>Sieger: "+win.name;
    if(currentRound<tournamentRounds){
        currentRound++;
        setTimeout(()=>{ document.getElementById("gameOver").style.display="none"; startGame(mode); },15000);
    } else {
        document.getElementById("finalTime").innerHTML+="<br><br><b>TURNIER BEENDET</b>";
    }
}

function updateRanking(){
    let sorted=rankingMode==="elo"?[...ranking].sort((a,b)=>b.elo-a.elo):[...ranking].sort((a,b)=>b.points-a.points);
    let html="<b>TURNIER RANKING</b><br><br>";
    for(let i=0;i<sorted.length;i++)
        html+=rankingMode==="elo"
            ?(i+1)+". "+sorted[i].name+" | "+Math.round(sorted[i].elo)+" ELO ("+(sorted[i].lastChange>=0?"+":"")+Math.round(sorted[i].lastChange)+")<br>"
            :(i+1)+". "+sorted[i].name+" | "+sorted[i].points+" Punkte<br>";
    document.getElementById("ranking").innerHTML=html;
}

let lastEloRender=0;
function updateEloTable(){
    if(Date.now()-lastEloRender<400) return;
    lastEloRender=Date.now();
    let sorted=[...participants].sort((a,b)=>b.elo-a.elo);
    let html="";
    for(let i=0;i<sorted.length;i++){
        const p=sorted[i];
        const active=matches.some(m=>m.running&&m.players.includes(p));
        const isSpectating=p.name==="DU" && humanRemovedFromQueue;
        html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <div style="width:12px;height:12px;border-radius:50%;background:${isSpectating?"#aaa":active?"lime":"red"};flex-shrink:0;"></div>
            <div>${i+1}. ${p.name}${isSpectating?" 👁":""}<br>${Math.round(p.elo)}
                <span style="color:${p.lastChange>=0?"lime":"red"}">(${p.lastChange>=0?"+":""}${Math.round(p.lastChange)})</span>
            </div></div>`;
    }
    const me=participants.find(p=>p.name==="DU");
    if(me){
        const myRank=sorted.findIndex(p=>p.name==="DU")+1;
        const timeEl=document.getElementById("time");
        const recEl=document.getElementById("record");
        const ballsEl=document.getElementById("balls");
        if(timeEl) timeEl.textContent=Math.round(me.elo);
        if(recEl) recEl.textContent=myRank;
        if(ballsEl) ballsEl.textContent=participants.length;
    }
    document.getElementById("eloList").innerHTML=html;
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(mode==="tournament"){
        let renderMatch=null;

        if(spectateModeActive && spectateMatchId){
            // TV-Modus: zeige gewähltes Match
            renderMatch=matches.find(m=>m.id===spectateMatchId&&m.running);
        } else if(!humanRemovedFromQueue){
            // Normal: DUs eigenes Match
            const dm=playerMatchMap.get("DU");
            if(dm && dm.running) renderMatch=dm;
        }

        // Fallback nur im Spectator-Modus
        if(!renderMatch && spectateModeActive){
            renderMatch=matches.find(m=>m.running);
        }

        if(!renderMatch){
            ctx.fillStyle="white"; ctx.font="30px Arial"; ctx.textAlign="center";
            const msg = humanRemovedFromQueue && !spectateModeActive
                ? "Du schaust zu – wähle einen TV-Modus"
                : "Warte auf nächstes Match...";
            ctx.fillText(msg, canvas.width/2, canvas.height/2);
            return;
        }

        for(const b of renderMatch.balls){
            ctx.beginPath(); ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
            ctx.fillStyle="#ff4444"; ctx.fill();
        }
        for(const p of renderMatch.players){
            if(!p.alive) continue;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
            ctx.fillStyle=p.color; ctx.fill();
            ctx.fillStyle="white"; ctx.font="14px Arial"; ctx.textAlign="center";
            ctx.fillText(p.name, p.x, p.y-p.radius-10);
        }

        // ── Gegner-Info (nur wenn DU aktiv spielt, nicht im Spectator-Modus) ──
        const oppDiv  = document.getElementById("opponentInfo");
        const oppText = document.getElementById("opponentText");
        const spectDiv= document.getElementById("spectatorInfo");
        const spectText=document.getElementById("spectatorText");

        if(!spectateModeActive && !humanRemovedFromQueue){
            const myMatch=playerMatchMap.get("DU");
            if(myMatch && myMatch.running){
                const opp=myMatch.players.find(p=>p.name!=="DU");
                if(opp){
                    // Platz des Gegners im ELO-Ranking ermitteln
                    const sorted=[...participants].sort((a,b)=>b.elo-a.elo);
                    const oppRank=sorted.findIndex(p=>p.name===opp.name)+1;
                    oppDiv.style.display="block";
                    oppText.innerHTML=
                        `Gegner: <b style="color:#ffd700">${opp.name}</b><br>`+
                        `Platz: <b>#${oppRank}</b> von ${participants.length}<br>`+
                        `ELO: <b>${Math.round(opp.elo)}</b><br>`+
                        `Skill: <b>${Math.round(opp.skill*100)}%</b>`;
                }
            } else {
                oppDiv.style.display="none";
            }
            spectDiv.style.display="none";
        } else if(spectateModeActive){
            oppDiv.style.display="none";
            spectDiv.style.display="block";
            const p1=renderMatch.players[0], p2=renderMatch.players[1];
            spectText.innerHTML=`<b>${p1.name}</b> (${Math.round(p1.elo)}) vs <b>${p2.name}</b> (${Math.round(p2.elo)})`;
        } else {
            oppDiv.style.display="none";
            spectDiv.style.display="none";
        }
        return;
    }

    // Nicht-Tournament
    for(const b of balls){
        ctx.beginPath(); ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
        ctx.fillStyle="#ff4444"; ctx.fill();
    }
    for(const p of players){
        if(!p.alive) continue;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
        ctx.fillStyle=p.color; ctx.fill();
        ctx.fillStyle="white"; ctx.font="14px Arial"; ctx.textAlign="center";
        ctx.fillText(p.name, p.x, p.y-p.radius-10);
    }
}

// ─── TV-Modus (Spectator aktivieren und DU entfernen) ─────────────────────────
function setTVMode(m){
    followMode=m;

    if(m==="target"){
        const name=prompt("Wen willst du zuschauen? (Bot-Name)");
        if(!name) return;
        targetName=name.toLowerCase();
    }

    // DU aus der Queue und dem Turnier entfernen
    if(!humanRemovedFromQueue){
        humanRemovedFromQueue=true;
        waitingQueue=waitingQueue.filter(p=>p.name!=="DU");
        // Wenn DU gerade in einem Match ist: Match wird noch beendet,
        // aber danach kommt DU nicht mehr zurück (finishMatch prüft humanRemovedFromQueue)
    }

    spectateModeActive=true;
    spectateMatchId=null; // wird sofort von autoFollowSpectate gesetzt
    autoFollowSpectate();

    document.getElementById("spectatorInfo").style.display="block";
}

function pickRandomMatch(){
    const live=matches.filter(m=>m.running);
    if(!live.length) return;
    spectateMatchId=live[Math.floor(Math.random()*live.length)].id;
}
function pickBestMatch(){
    let best=null, bestAvg=-1;
    for(const m of matches){
        if(!m.running) continue;
        const avg=(m.players[0].elo+m.players[1].elo)/2;
        if(avg>bestAvg){ bestAvg=avg; best=m; }
    }
    if(best) spectateMatchId=best.id;
}

function resumePlay(){
    // Spectator deaktivieren, DU wieder einreihen
    spectateModeActive=false;
    followMode="none";
    spectateMatchId=null;
    document.getElementById("spectatorInfo").style.display="none";

    if(humanRemovedFromQueue){
        humanRemovedFromQueue=false;
        const me=participants.find(p=>p.name==="DU");
        if(me && !playerMatchMap.has("DU")){
            waitingQueue.push(me);
            seededMatchmaking();
        }
    }
}

// ─── Controls ─────────────────────────────────────────────────────────────────
function moveSingle(x,y){
    // Im Spectator-Modus keine Steuerung
    if(spectateModeActive || humanRemovedFromQueue) return;
    if(mode==="tournament"){
        const match=playerMatchMap.get("DU");
        if(!match||!match.running) return;
        const me=match.players.find(p=>p.name==="DU");
        if(me){ me.x=x; me.y=y; }
        return;
    }
    if(players[0]){ players[0].x=x; players[0].y=y; }
}

document.addEventListener("keydown",e=>{ keys[e.key.toLowerCase()]=true; });
document.addEventListener("keyup",e=>{ keys[e.key.toLowerCase()]=false; });
canvas.addEventListener("mousemove",e=>{ if(running&&(mode==="single"||mode==="tournament")) moveSingle(e.clientX,e.clientY); });
canvas.addEventListener("touchmove",e=>{ if(running&&(mode==="single"||mode==="tournament")) moveSingle(e.touches[0].clientX,e.touches[0].clientY); });

setInterval(()=>{ if(mode==="tournament"&&running&&waitingQueue.length>=2) seededMatchmaking(); },1000);

loop();
</script>
