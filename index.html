<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finger Dodge</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#111;font-family:Arial,sans-serif;}
canvas{display:block;touch-action:none;}

#ui{
    position:absolute;top:20px;left:20px;color:white;
    font-size:20px;font-weight:bold;
}

#menu{
    position:absolute;inset:0;display:flex;
    flex-direction:column;justify-content:center;
    align-items:center;background:#111;color:white;
}

h1{font-size:50px;margin-bottom:20px;}

button{
    padding:15px 35px;font-size:22px;
    border:none;border-radius:12px;cursor:pointer;
    margin:10px;
}

#gameOver{
    position:absolute;inset:0;background:rgba(0,0,0,0.8);
    display:none;flex-direction:column;
    justify-content:center;align-items:center;color:white;
}

#settings{
display:none;
position:absolute;
inset:0;
background:#111;
color:white;
flex-direction:column;
justify-content:center;
align-items:center;
}
</style>
</head>

<body>

<div id="ui">
Zeit: <span id="time">0</span>s<br>
Rekord: <span id="record">0</span>s<br>
Bälle: <span id="balls">0</span><br>
Modus: <span id="mode">-</span>
</div>

<div id="menu">
<h1>Finger Dodge</h1>
<button onclick="startGame('single')">Singleplayer</button>
<button onclick="startGame('multi')">Multiplayer (lokal)</button>
<button onclick="startGame('ai')">AI Spectate</button>
<button onclick="openSettings()">Settings</button>
<button onclick="resetRecord()">Rekord zurücksetzen</button>
</div>

<div id="settings">
<h2>Settings</h2>

<label>Start-Bälle</label>
<input id="startBalls" type="number" value="3" min="1" max="20">

<br><br>

<label>Spawn-Zeit</label>
<input id="spawnTime" type="number" value="5" min="1" max="30">

<br><br>

<label>Ball-Speed</label>
<select id="ballSpeed">
<option value="0.5">Langsam</option>
<option value="1" selected>Normal</option>
<option value="1.5">Schnell</option>
<option value="2">Extrem</option>
</select>

<br><br>
<label>AI Bots</label>
<input id="botCount" type="number" value="10" min="2">
<br><br>

<label>Ranking-System</label>
<select id="rankingMode">
<option value="points" selected>Punkte</option>
<option value="elo">ELO</option>
</select>
<br><br>
<label>Spielergröße</label>
<input id="playerSize" type="number" value="18" min="5" max="50">

<br><br>

<button onclick="saveSettings()">Speichern</button>
</div>

<div id="gameOver">
<h2>GAME OVER</h2>
<p>Überlebt: <span id="finalTime">0</span>s</p>
<button onclick="restartGame()">Nochmal</button>
<div id="ranking" style="
position:absolute;
top:20px;
right:20px;
color:white;
font-size:18px;
text-align:left;
max-height:90vh;
overflow:auto;
">
</div>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ---------------- STATE ----------------
let balls = [];
let players = [];
let ranking = [];
let multiplayerScores = [
{name:"Spieler 1",points:0},
{name:"Spieler 2",points:0}
];
let eliminated = [];
let running = false;
let startTime = 0;
let spawnTimer = null;
let mode = "single";
let tournamentRounds = 100;
let currentRound = 1;
let roundFinished = false;
let startBallCount = 3;
let spawnDelay = 5000;
let ballSpeedMultiplier = 1;
let playerRadiusSetting = 18;
let aiBotCount = 10;
let rankingMode = "points";
// ---------------- RECORD ----------------
let record = localStorage.getItem("fingerDodgeRecord") || 0;
document.getElementById("record").textContent = record;

// ---------------- PLAYER FACTORY ----------------
function createPlayer(x,y,color,name){

return {
x,
y,
radius:playerRadiusSetting,
color,
name,
points:0,
elo:1500,
lastChange:0,
alive:true
};

}

// ---------------- INPUT ----------------
const keys = {};
document.addEventListener("keydown",(e)=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",(e)=>keys[e.key.toLowerCase()]=false);

// ---------------- UI ----------------
function openSettings(){
document.getElementById("menu").style.display="none";
document.getElementById("settings").style.display="flex";
}

function saveSettings(){
startBallCount = Number(document.getElementById("startBalls").value);
spawnDelay = Number(document.getElementById("spawnTime").value)*1000;
ballSpeedMultiplier = Number(document.getElementById("ballSpeed").value);
playerRadiusSetting = Number(document.getElementById("playerSize").value);
aiBotCount = Number(document.getElementById("botCount").value);
rankingMode =
document.getElementById("rankingMode").value;
document.getElementById("settings").style.display="none";
document.getElementById("menu").style.display="flex";
}

// ---------------- BALLS ----------------
function createBall(){

const r = 15 + Math.random()*20;

let x,y;
let valid = false;

while(!valid){

x = Math.random()*(canvas.width-r*2)+r;
y = Math.random()*(canvas.height-r*2)+r;

valid = true;

for(const p of players){

const dx = p.x-x;
const dy = p.y-y;

const dist = Math.sqrt(dx*dx+dy*dy);

if(dist < 200){

valid = false;
break;

}
}

}

balls.push({
x,y,
radius:r,
vx:(Math.random()*4+2)*ballSpeedMultiplier*(Math.random()<0.5?-1:1),
vy:(Math.random()*4+2)*ballSpeedMultiplier*(Math.random()<0.5?-1:1)
});

document.getElementById("balls").textContent = balls.length;
}

// ---------------- AI ----------------
function updateAI(p){

if(!p.targetX || !p.targetY || Math.random() < 0.03){
p.targetX = Math.random() * canvas.width;
p.targetY = Math.random() * canvas.height;
}

// Richtung Ziel
let moveX = p.targetX - p.x;
let moveY = p.targetY - p.y;

let moveDist = Math.sqrt(moveX*moveX + moveY*moveY) || 1;
moveX /= moveDist;
moveY /= moveDist;

// Gefahr vermeiden
let avoidX = 0;
let avoidY = 0;

for(const b of balls){

let dx = p.x - b.x;
let dy = p.y - b.y;

let dist = Math.sqrt(dx*dx + dy*dy) || 1;

if(dist < p.safeRadius){

let strength = (p.safeRadius / dist);
let force = Math.min(strength * p.fear, 6);

avoidX += (dx / dist) * force;
avoidY += (dy / dist) * force;

}

}

// 🎯 individuelle Gewichtung
let vx =
moveX * (5 + p.aggressiveness * 6) +
avoidX * (10 + p.fear * 15);

let vy =
moveY * (5 + p.aggressiveness * 6) +
avoidY * (10 + p.fear * 15);

// 🌀 unterschiedliche Unruhe
vx += (Math.random()-0.5) * p.wander * 2;
vy += (Math.random()-0.5) * p.wander * 2;

// Bewegung
let speed = p.speed;

let len = Math.sqrt(vx*vx + vy*vy) || 1;

p.x += (vx/len) * speed;
p.y += (vy/len) * speed;

// Grenzen
p.x = Math.max(p.radius, Math.min(canvas.width-p.radius, p.x));
p.y = Math.max(p.radius, Math.min(canvas.height-p.radius, p.y));

}
function createBot(i){
const hue = (i * 360 / aiBotCount);

return {
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
radius: playerRadiusSetting,
color: `hsl(${hue},100%,50%)`,
name: "Bot " + (i+1),

points: 0,
elo: 1500,
lastChange: 0,
alive: true,

// 🧠 individuelle KI Werte
aggressiveness: Math.random(),
fear: Math.random(),
wander: Math.random(),
speed: 2.5 + Math.random()*0.1,
safeRadius: 120 + Math.random()*140,

targetX: 0,
targetY: 0
};
}
// ---------------- START ----------------
function startGame(selectedMode){

// Reset Runde nur wenn NICHT AI-Continuing
if(mode !== "ai"){
currentRound = 1;
}

mode = selectedMode;
document.getElementById("mode").textContent = mode;

document.getElementById("menu").style.display = "none";
document.getElementById("gameOver").style.display = "none";

balls = [];
players = [];

running = true;
startTime = Date.now();


// ---------------- SINGLEPLAYER ----------------
if(mode === "single"){
players.push(
createPlayer(300, 300, "#00ff88", "Spieler")
);
}


// ---------------- MULTIPLAYER ----------------
if(mode === "multi"){
players.push(
createPlayer(200, 200, "#00ff88", "Spieler 1")
);

players.push(
createPlayer(400, 200, "#4488ff", "Spieler 2")
);
}


// ---------------- AI MODE ----------------
if(mode === "ai") {

eliminated = [];

if(currentRound === 1){

ranking = [];

for(let i = 0; i < aiBotCount; i++){
const bot = createBot(i);
players.push(bot);
ranking.push(bot);
}

} else {

// neue Runde mit alten Stats
players = [];

for(const oldBot of ranking){

const bot = createBot(0);

bot.x = Math.random() * canvas.width;
bot.y = Math.random() * canvas.height;

bot.name = oldBot.name;
bot.color = oldBot.color;

bot.points = oldBot.points;
bot.elo = oldBot.elo;

players.push(bot);
}
}
}


// ---------------- STARTBÄLLE ----------------
for(let i = 0; i < startBallCount; i++){
createBall();
}


// ---------------- SPAWN STARTEN ----------------
spawnLoop();
}
// ---------------- SPAWN ----------------
function spawnLoop(){
if(!running) return;

if(spawnTimer) clearTimeout(spawnTimer);

spawnTimer = setTimeout(() => {
createBall();
spawnLoop();
}, spawnDelay);
}

// ---------------- RESTART ----------------
function restartGame(){
if(spawnTimer) clearTimeout(spawnTimer);

const keepRound = currentRound;
const keepMode = mode;

startGame(keepMode);

currentRound = keepRound;
}

// ---------------- RECORD ----------------
function resetRecord(){
if(confirm("Rekord löschen?")){
record=0;
localStorage.setItem("fingerDodgeRecord",0);
document.getElementById("record").textContent=0;
}
}

// ---------------- GAME OVER ----------------
function gameOver(){
running=false;

let survived=Math.floor((Date.now()-startTime)/1000);

if(survived>record){
record=survived;
localStorage.setItem("fingerDodgeRecord",record);
document.getElementById("record").textContent=record;
}

document.getElementById("finalTime").textContent=survived;
document.getElementById("gameOver").style.display="flex";
}

// ---------------- UPDATE ----------------
function update(){
if(!running) return;

document.getElementById("time").textContent =
Math.floor((Date.now()-startTime)/1000);

// MOVEMENT
if(mode==="multi"){
if(keys["w"]) players[0].y-=5;
if(keys["s"]) players[0].y+=5;
if(keys["a"]) players[0].x-=5;
if(keys["d"]) players[0].x+=5;

if(keys["arrowup"]) players[1].y-=5;
if(keys["arrowdown"]) players[1].y+=5;
if(keys["arrowleft"]) players[1].x-=5;
if(keys["arrowright"]) players[1].x+=5;
}

if(mode==="ai"){

for(const p of players){

if(p.alive){
updateAI(p);
}

}

updateRanking();

}

// bounds
for(const p of players){
p.x=Math.max(p.radius,Math.min(canvas.width-p.radius,p.x));
p.y=Math.max(p.radius,Math.min(canvas.height-p.radius,p.y));
}

// balls
for(const b of balls){
b.x+=b.vx;
b.y+=b.vy;

if(b.x-b.radius<0||b.x+b.radius>canvas.width)b.vx*=-1;
if(b.y-b.radius<0||b.y+b.radius>canvas.height)b.vy*=-1;
}

// collision
for(const p of players){
check(p);
}
}

// ---------------- COLLISION ----------------
function check(p){

if(!p.alive) return;

for(const b of balls){

let dx=p.x-b.x;
let dy=p.y-b.y;

let d=Math.sqrt(dx*dx+dy*dy);

if(d<p.radius+b.radius){

p.alive=false;

if(mode==="ai"){

eliminated.push(p);

const alive =
players.filter(x=>x.alive);

if(alive.length<=1){

if(alive.length===1){
eliminated.push(alive[0]);
}

finishArena();
}

}else if(mode==="multi"){

const winner =
players.find(x=>x!==p && x.alive);

if(winner){

if(winner===players[0]){
multiplayerScores[0].points++;
}else{
multiplayerScores[1].points++;
}

}

updateMultiplayerRanking();

gameOver();

}else{

gameOver();

}
break;

}

}

}
function finishArena(){

eliminated.reverse();

if(rankingMode === "points"){

for(let i=0;i<eliminated.length;i++){

const bot =
ranking.find(
b=>b.name===eliminated[i].name
);

if(bot){

bot.points +=
eliminated.length-i-1;

}

}

}else{

const K = 16;
for(const bot of ranking){
bot.lastChange = 0;
}
for(let i=0;i<eliminated.length;i++){

const botA =
ranking.find(
b=>b.name===eliminated[i].name
);

for(let j=i+1;j<eliminated.length;j++){

const botB =
ranking.find(
b=>b.name===eliminated[j].name
);

const expectedA =
1/(1+Math.pow(
10,
(botB.elo-botA.elo)/400
));

const expectedB =
1-expectedA;

const gainA = K*(1-expectedA);
const gainB = K*(0-expectedB);

botA.elo += gainA;
botB.elo += gainB;

botA.lastChange += gainA;
botB.lastChange += gainB;

}

}

}

updateRanking();

running = false;
roundFinished = true;

const winner = eliminated[0];

document.getElementById("gameOver").style.display = "flex";

document.getElementById("finalTime").innerHTML =
"Runde " + currentRound + "/" + tournamentRounds +
"<br>Sieger: " + winner.name;

if(currentRound < tournamentRounds){

currentRound++;

setTimeout(()=>{

document.getElementById("gameOver").style.display="none";

restartGame();

},15000);

}else{

document.getElementById("finalTime").innerHTML +=
"<br><br><b>TURNIER BEENDET</b>";

}
}

function updateRanking(){

const sorted = [...ranking];

if(rankingMode === "points"){

sorted.sort(
(a,b)=>b.points-a.points
);

}else{

sorted.sort(
(a,b)=>b.elo-a.elo
);

}

let html =
"<b>Turnier Ranking</b><br>" +
"Modus: " +
(rankingMode==="elo"?"ELO":"Punkte") +
"<br>" +
"Runde: " +
currentRound +
"/" +
tournamentRounds +
"<br><br>";

for(let i=0;i<sorted.length;i++){

if(rankingMode==="elo"){

html +=
(i+1)+". "
+sorted[i].name
+" - "
+Math.round(sorted[i].elo)
+" ELO ("
+(sorted[i].lastChange >= 0 ? "+" : "")
+Math.round(sorted[i].lastChange)
+")<br>";

}else{

html +=
(i+1)+". "
+sorted[i].name
+" - "
+sorted[i].points
+" Punkte<br>";

}

}

document.getElementById("ranking").innerHTML =
html;
}
function updateMultiplayerRanking(){

let html =
"<b>Multiplayer Ranking</b><br><br>";

html +=
"1. Spieler 1 - "
+ multiplayerScores[0].points
+ " Punkte<br>";

html +=
"2. Spieler 2 - "
+ multiplayerScores[1].points
+ " Punkte<br>";

document.getElementById("ranking").innerHTML =
html;

}
// ---------------- DRAW ----------------
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(const b of balls){
ctx.beginPath();
ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
ctx.fillStyle="#ff4444";
ctx.fill();
}

for(const p of players){

if(!p.alive) continue;

ctx.beginPath();
ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();
ctx.fillStyle = "white";
ctx.font = "14px Arial";
ctx.textAlign = "center";

ctx.fillText(
p.name,
p.x,
p.y - p.radius - 10
);
}
}

// ---------------- LOOP ----------------
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

// ---------------- SINGLE CONTROL ----------------
function moveSingle(x,y){
players[0].x=x;
players[0].y=y;
}

canvas.addEventListener("mousemove",(e)=>{
if(mode==="single"&&running)moveSingle(e.clientX,e.clientY);
});

canvas.addEventListener("touchmove",(e)=>{
if(mode==="single"&&running)
moveSingle(e.touches[0].clientX,e.touches[0].clientY);
});

</script>
</body>
</html>
