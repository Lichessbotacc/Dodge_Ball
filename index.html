<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finger Dodge</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#111;font-family:Arial,sans-serif;}
canvas{display:block;touch-action:none;}

#ui{
    position:absolute;top:20px;left:20px;color:white;
    font-size:20px;font-weight:bold;
}

#menu{
    position:absolute;inset:0;display:flex;
    flex-direction:column;justify-content:center;
    align-items:center;background:#111;color:white;
}

h1{font-size:50px;margin-bottom:20px;}

button{
    padding:15px 35px;font-size:22px;
    border:none;border-radius:12px;cursor:pointer;
    margin:10px;
}

#gameOver{
    position:absolute;inset:0;background:rgba(0,0,0,0.8);
    display:none;flex-direction:column;
    justify-content:center;align-items:center;color:white;
}
</style>
</head>

<body>

<div id="ui">
    Zeit: <span id="time">0</span>s<br>
    Rekord: <span id="record">0</span>s<br>
    Bälle: <span id="balls">0</span><br>
    Modus: <span id="mode">-</span>
</div>

<div id="menu">
    <h1>Finger Dodge</h1>
    <button onclick="startGame('single')">Singleplayer</button>
    <button onclick="startGame('multi')">Multiplayer (lokal)</button>
    <button onclick="openSettings()">Settings</button>
    <button onclick="resetRecord()">Rekord zurücksetzen</button>
</div>
<div id="settings" style="
display:none;
position:absolute;
inset:0;
background:#111;
color:white;
flex-direction:column;
justify-content:center;
align-items:center;
">

<h2>Settings</h2>

<label>Start-Bälle</label>
<input id="startBalls" type="number" value="3" min="1" max="20">

<br><br>

<label>Spawn-Zeit</label>
<input id="spawnTime" type="number" value="5" min="1" max="30">

<br><br>

<label>Ball-Speed</label>
<select id="ballSpeed">
<option value="0.5">Langsam</option>
<option value="1" selected>Normal</option>
<option value="1.5">Schnell</option>
<option value="2">Extrem</option>
</select>

<br><br>

<label>Spielergröße</label>
<input id="playerSize" type="number" value="18" min="5" max="50">

<br><br>

<br><br>

<label>Steuerung</label>
<select id="controlMode">
    <option value="touch" selected>Touch / Maus</option>
    <option value="joystick">Joystick</option>
</select>

<button onclick="saveSettings()">Speichern</button>

</div>
<div id="gameOver">
    <h2>GAME OVER</h2>
    <p>Überlebt: <span id="finalTime">0</span>s</p>
    <button onclick="restartGame()">Nochmal</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const joystick1 = {
    active:false,
    baseX:120,
    baseY:0,
    x:120,
    y:0
};

const joystick2 = {
    active:false,
    baseX:0,
    baseY:0,
    x:0,
    y:0
};
    
function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    joystick1.baseX = 120;
    joystick1.baseY = canvas.height - 120;

    joystick2.baseX = canvas.width - 120;
    joystick2.baseY = canvas.height - 120;

    joystick1.x = joystick1.baseX;
    joystick1.y = joystick1.baseY;

    joystick2.x = joystick2.baseX;
    joystick2.y = joystick2.baseY;
}

// ---------------- GAME STATE ----------------
let balls = [];
let running = false;
let startTime = 0;
let spawnTimer = null;
let mode = "single";
let startBallCount = 3;
let spawnDelay = 5000;
let ballSpeedMultiplier = 1;
let playerRadiusSetting = 18;
let controlMode = "touch"; // "touch" oder "joystick"


// ---------------- RECORD ----------------
let record = localStorage.getItem("fingerDodgeRecord") || 0;
document.getElementById("record").textContent = record;

// ---------------- PLAYERS ----------------
const player1 = {
    x: 200, y: 200, radius: 18, color:"#00ff88"
};

const player2 = {
    x: 400, y: 200, radius: 18, color:"#4488ff"
};

// ---------------- INPUT ----------------
const keys = {};

document.addEventListener("keydown",(e)=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",(e)=>keys[e.key.toLowerCase()]=false);

function openSettings(){
    document.getElementById("menu").style.display="none";
    document.getElementById("settings").style.display="flex";
}

function saveSettings(){

    startBallCount =
        Number(document.getElementById("startBalls").value);

    spawnDelay =
        Number(document.getElementById("spawnTime").value) * 1000;

    ballSpeedMultiplier =
        Number(document.getElementById("ballSpeed").value);

    playerRadiusSetting =
        Number(document.getElementById("playerSize").value);

    controlMode =
        document.getElementById("controlMode").value;

    document.getElementById("settings").style.display="none";
    document.getElementById("menu").style.display="flex";
}
// ---------------- BALLS ----------------
function createBall(){
    const radius = 15 + Math.random()*20;
    let x,y;

    const safeDistance = 120;
    let valid = false;

    while(!valid){
        x = radius + Math.random()*(canvas.width-2*radius);
        y = radius + Math.random()*(canvas.height-2*radius);

        const dx1 = player1.x - x;
        const dy1 = player1.y - y;

        const dx2 = player2.x - x;
        const dy2 = player2.y - y;

        valid =
            Math.sqrt(dx1*dx1 + dy1*dy1) > safeDistance &&
            Math.sqrt(dx2*dx2 + dy2*dy2) > safeDistance;
    }

    balls.push({
        x,y,radius,
        vx:(Math.random()*4+2)*ballSpeedMultiplier*(Math.random()<0.5?-1:1),
        vy:(Math.random()*4+2)*ballSpeedMultiplier*(Math.random()<0.5?-1:1)
    });

    document.getElementById("balls").textContent = balls.length;
}

// ---------------- START ----------------
function startGame(selectedMode){
    mode = selectedMode;
    document.getElementById("mode").textContent = mode;

    document.getElementById("menu").style.display="none";
    document.getElementById("gameOver").style.display="none";

    balls = [];

   player1.x = 200;
   player1.y = 200;
   player1.radius = playerRadiusSetting;

   player2.x = 400;
   player2.y = 200;
   player2.radius = playerRadiusSetting;

    running = true;
    startTime = Date.now();

    for(let i=0;i<startBallCount;i++) createBall();

    spawnLoop();
}

// ---------------- SPAWN ----------------
function spawnLoop(){
    if(!running) return;
    spawnTimer=setTimeout(()=>{
        if(running){
            createBall();
            spawnLoop();
        }
    },spawnDelay);
}

// ---------------- RESTART ----------------
function restartGame(){
    if(spawnTimer) clearTimeout(spawnTimer);
    startGame(mode);
}

// ---------------- RECORD ----------------
function resetRecord(){
    if(confirm("Rekord löschen?")){
        record=0;
        localStorage.setItem("fingerDodgeRecord",0);
        document.getElementById("record").textContent=0;
    }
}

// ---------------- GAME OVER ----------------
function gameOver(){
    running=false;

    const survived=Math.floor((Date.now()-startTime)/1000);

    if(survived>record){
        record=survived;
        localStorage.setItem("fingerDodgeRecord",record);
        document.getElementById("record").textContent=record;
    }

    document.getElementById("finalTime").textContent=survived;
    document.getElementById("gameOver").style.display="flex";
}
function applyJoystick(j, p){
    if(!j.active) return;

    const dx = j.x - j.baseX;
    const dy = j.y - j.baseY;

    const speed = 0.08;

    p.x += dx * speed;
    p.y += dy * speed;
}
// ---------------- UPDATE ----------------
function update(){
    if(!running) return;

    // --- TIMER ---
    document.getElementById("time").textContent =
        Math.floor((Date.now()-startTime)/1000);

    

    // --- KEYBOARD MOVEMENT (MULTI ONLY) ---
    if(mode==="multi"){
        if(keys["w"]) player1.y -= 5;
        if(keys["s"]) player1.y += 5;
        if(keys["a"]) player1.x -= 5;
        if(keys["d"]) player1.x += 5;

        if(keys["arrowup"]) player2.y -= 5;
        if(keys["arrowdown"]) player2.y += 5;
        if(keys["arrowleft"]) player2.x -= 5;
        if(keys["arrowright"]) player2.x += 5;
    }

    // --- PLAYER BOUNDARIES ---
    player1.x = Math.max(player1.radius,
        Math.min(canvas.width - player1.radius, player1.x));

    player1.y = Math.max(player1.radius,
        Math.min(canvas.height - player1.radius, player1.y));

    player2.x = Math.max(player2.radius,
        Math.min(canvas.width - player2.radius, player2.x));

    player2.y = Math.max(player2.radius,
        Math.min(canvas.height - player2.radius, player2.y));

    // --- BALL MOVEMENT ---
    for(const ball of balls){
        ball.x += ball.vx;
        ball.y += ball.vy;

        if(ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width)
            ball.vx *= -1;

        if(ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height)
            ball.vy *= -1;
    }

    // --- COLLISION ---
    check(player1);
    if(mode==="multi") check(player2);
}
if(mode === "multi"){
    applyJoystick(joystick1, player1);
    applyJoystick(joystick2, player2);
}

// ---------------- COLLISION ----------------
function check(p){
    for(const b of balls){
        const dx=p.x-b.x;
        const dy=p.y-b.y;
        const dist=Math.sqrt(dx*dx+dy*dy);

        if(dist<p.radius+b.radius){
            gameOver();
        }
    }
}

// ---------------- DRAW ----------------
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(const b of balls){
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
        ctx.fillStyle="#ff4444";
        ctx.fill();
    }

    drawPlayer(player1);

    if(mode==="multi") drawPlayer(player2);
        if(controlMode==="joystick" && mode==="single"){

        ctx.beginPath();
        ctx.arc(joystick.baseX, joystick.baseY, 50, 0, Math.PI*2);
        ctx.strokeStyle="white";
        ctx.lineWidth=3;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(joystick.x, joystick.y, 25, 0, Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
    }
    if(mode === "multi"){
    drawJoystick(joystick1);
    drawJoystick(joystick2);
}
}

function drawPlayer(p){
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
}
function drawJoystick(j){
    ctx.beginPath();
    ctx.arc(j.baseX, j.baseY, 50, 0, Math.PI*2);
    ctx.strokeStyle="white";
    ctx.lineWidth=3;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(j.x, j.y, 25, 0, Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
}
// ---------------- LOOP ----------------
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();

// ---------------- CONTROLS SINGLEPLAYER ----------------
function movePlayerSingle(x,y){
    player1.x=Math.max(player1.radius,Math.min(canvas.width-player1.radius,x));
    player1.y=Math.max(player1.radius,Math.min(canvas.height-player1.radius,y));
}

canvas.addEventListener("mousemove",(e)=>{
    if(mode==="single" && running){
        movePlayerSingle(e.clientX,e.clientY);
    }
});

canvas.addEventListener("touchmove",(e)=>{
    if(!running) return;

    const touches = e.touches;

    for(let t of touches){
        const x = t.clientX;
        const y = t.clientY;

        // LINKS = PLAYER 1
        if(x < canvas.width / 2){
            joystick1.active = true;
            joystick1.x = x;
            joystick1.y = y;
        }

        // RECHTS = PLAYER 2
        else{
            joystick2.active = true;
            joystick2.x = x;
            joystick2.y = y;
        }
    }
});
    canvas.addEventListener("touchend",()=>{
    joystick1.active = false;
    joystick2.active = false;

    joystick1.x = joystick1.baseX;
    joystick1.y = joystick1.baseY;

    joystick2.x = joystick2.baseX;
    joystick2.y = joystick2.baseY;
});
</script>

</body>
</html>
