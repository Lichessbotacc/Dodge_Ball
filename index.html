<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finger Dodge</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#111;font-family:Arial,sans-serif;}
canvas{display:block;touch-action:none;}

#ui{
    position:absolute;top:20px;left:20px;color:white;
    font-size:20px;font-weight:bold;
}

#menu{
    position:absolute;inset:0;display:flex;
    flex-direction:column;justify-content:center;
    align-items:center;background:#111;color:white;
}

h1{font-size:50px;margin-bottom:20px;}

button{
    padding:15px 35px;font-size:22px;
    border:none;border-radius:12px;cursor:pointer;
    margin:10px;
}

#gameOver{
    position:absolute;inset:0;background:rgba(0,0,0,0.8);
    display:none;flex-direction:column;
    justify-content:center;align-items:center;color:white;
}

#settings{
display:none;
position:absolute;
inset:0;
background:#111;
color:white;
flex-direction:column;
justify-content:center;
align-items:center;
}
</style>
</head>

<body>

<div id="ui">
Zeit: <span id="time">0</span>s<br>
Rekord: <span id="record">0</span>s<br>
Bälle: <span id="balls">0</span><br>
Modus: <span id="mode">-</span>
</div>

<div id="menu">
<h1>Finger Dodge</h1>
<button onclick="startGame('single')">Singleplayer</button>
<button onclick="startGame('multi')">Multiplayer (lokal)</button>
<button onclick="startGame('ai')">AI Spectate</button>
<button onclick="openSettings()">Settings</button>
<button onclick="resetRecord()">Rekord zurücksetzen</button>
</div>

<div id="settings">
<h2>Settings</h2>

<label>Start-Bälle</label>
<input id="startBalls" type="number" value="3" min="1" max="20">

<br><br>

<label>Spawn-Zeit</label>
<input id="spawnTime" type="number" value="5" min="1" max="30">

<br><br>

<label>Ball-Speed</label>
<select id="ballSpeed">
<option value="0.5">Langsam</option>
<option value="1" selected>Normal</option>
<option value="1.5">Schnell</option>
<option value="2">Extrem</option>
</select>

<br><br>
<label>AI Bots</label>
<input id="botCount" type="number" value="10" min="2">
<br><br>

<label>Ranking-System</label>
<select id="rankingMode">
<option value="points" selected>Punkte</option>
<option value="elo">ELO</option>
</select>

<br><br>
<label>Spielergröße</label>
<input id="playerSize" type="number" value="18" min="5" max="50">

<br><br>

<button onclick="saveSettings()">Speichern</button>
</div>

<div id="gameOver">
<h2>GAME OVER</h2>
<p>Überlebt: <span id="finalTime">0</span>s</p>
<button onclick="restartGame()">Nochmal</button>

<div id="ranking" style="position:absolute;top:20px;right:20px;color:white;font-size:18px;text-align:left;max-height:90vh;overflow:auto;"></div>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// STATE
let balls = [];
let players = [];
let ranking = [];
let eliminated = [];
let running = false;

let startTime = 0;
let spawnTimer = null;
let mode = "single";

let currentRound = 1;
let tournamentRounds = 100;

let startBallCount = 3;
let spawnDelay = 5000;
let ballSpeedMultiplier = 1;
let playerRadiusSetting = 18;
let aiBotCount = 10;
let rankingMode = "points";

let record = localStorage.getItem("fingerDodgeRecord") || 0;
document.getElementById("record").textContent = record;

// PLAYER
function createPlayer(x,y,color,name){
return {
x,y,
radius:playerRadiusSetting,
color,
name,
points:0,
elo:1500,
lastChange:0,
alive:true
};
}

// INPUT
const keys = {};
document.addEventListener("keydown",(e)=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",(e)=>keys[e.key.toLowerCase()]=false);

// BALL
function createBall(){
const r = 15 + Math.random()*20;
let x,y,valid=false;

while(!valid){
x = Math.random()*(canvas.width-r*2)+r;
y = Math.random()*(canvas.height-r*2)+r;
valid = true;

for(const p of players){
if(Math.hypot(p.x-x,p.y-y)<200){
valid=false;break;
}
}
}

balls.push({
x,y,
radius:r,
vx:(Math.random()*4+2)*ballSpeedMultiplier*(Math.random()<0.5?-1:1),
vy:(Math.random()*4+2)*ballSpeedMultiplier*(Math.random()<0.5?-1:1)
});

document.getElementById("balls").textContent = balls.length;
}

// AI (unchanged core)
function updateAI(p){
if(!p.targetX || Math.random()<0.03){
p.targetX=Math.random()*canvas.width;
p.targetY=Math.random()*canvas.height;
}

let mx=p.targetX-p.x;
let my=p.targetY-p.y;
let d=Math.hypot(mx,my)||1;
mx/=d;my/=d;

let ax=0,ay=0;
for(const b of balls){
const dx=p.x-b.x;
const dy=p.y-b.y;
const dist=Math.hypot(dx,dy)||1;
if(dist<180){
const f=Math.min((180/dist)*0.6,6);
ax+=(dx/dist)*f;
ay+=(dy/dist)*f;
}
}

let vx=mx*5+ax*18;
let vy=my*5+ay*18;

let len=Math.hypot(vx,vy)||1;
p.x+=(vx/len)*4.5;
p.y+=(vy/len)*4.5;

p.x=Math.max(p.radius,Math.min(canvas.width-p.radius,p.x));
p.y=Math.max(p.radius,Math.min(canvas.height-p.radius,p.y));
}

// START
function startGame(selectedMode){

mode=selectedMode;
document.getElementById("mode").textContent=mode;

document.getElementById("menu").style.display="none";
document.getElementById("gameOver").style.display="none";

balls=[];players=[];ranking=[];eliminated=[];
running=true;
startTime=Date.now();

if(mode==="single"){
const p=createPlayer(canvas.width/2,canvas.height/2,"#00ff88","Spieler");
players.push(p);ranking.push(p);

for(let i=0;i<aiBotCount;i++){
const b=createPlayer(Math.random()*canvas.width,Math.random()*canvas.height,
`hsl(${i*360/aiBotCount},100%,50%)`,"Bot "+i);
players.push(b);ranking.push(b);
}
}

if(mode==="ai"){
for(let i=0;i<aiBotCount;i++){
const b=createPlayer(Math.random()*canvas.width,Math.random()*canvas.height,
`hsl(${i*360/aiBotCount},100%,50%)`,"Bot "+i);
players.push(b);ranking.push(b);
}
}

for(let i=0;i<startBallCount;i++)createBall();
spawnLoop();
}

// SPAWN
function spawnLoop(){
if(!running)return;
spawnTimer=setTimeout(()=>{
createBall();
spawnLoop();
},spawnDelay);
}

// COLLISION FIXED FLOW
function check(p){
if(!p.alive)return;

for(const b of balls){
if(Math.hypot(p.x-b.x,p.y-b.y)<p.radius+b.radius){
p.alive=false;
eliminated.push(p);

const alive=players.filter(x=>x.alive);

if(alive.length<=1){
finishArena();
}
return;
}
}
}

// ⭐ FIXED RANKING SYSTEM
function finishArena(){

running=false;

const finalOrder=[...eliminated].reverse();

for(let i=0;i<finalOrder.length;i++){
finalOrder[i].rank=i+1;
}

// points / elo stable update
if(rankingMode==="points"){
finalOrder.forEach((p,i)=>{
p.points+=(finalOrder.length-i);
});
}else{
const K=16;
for(let i=0;i<finalOrder.length;i++){
for(let j=i+1;j<finalOrder.length;j++){

const A=finalOrder[i];
const B=finalOrder[j];

const expA=1/(1+Math.pow(10,(B.elo-A.elo)/400));

A.elo+=K*(1-expA);
B.elo+=K*(0-(1-expA));
}
}
}

// ranking rebuild (FIX)
ranking=[...players].sort((a,b)=>
rankingMode==="elo"?b.elo-a.elo:b.points-a.points
);

updateRanking();

document.getElementById("gameOver").style.display="flex";
document.getElementById("finalTime").textContent=
"Runde "+currentRound+"/"+tournamentRounds;

}

// RANKING UI FIX
function updateRanking(){
const sorted=[...ranking].sort((a,b)=>
rankingMode==="elo"?b.elo-a.elo:b.points-a.points
);

let html="Ranking<br><br>";

sorted.forEach((p,i)=>{
html+=`${i+1}. ${p.name} - `+
(rankingMode==="elo"
?Math.round(p.elo)+" ELO"
:p.points+" Punkte")+"<br>";
});

document.getElementById("ranking").innerHTML=html;
}

// LOOP
function loop(){
if(running){
for(const p of players)if(p.alive&&mode==="ai")updateAI(p);
for(const p of players)check(p);
}

ctx.clearRect(0,0,canvas.width,canvas.height);

balls.forEach(b=>{
ctx.beginPath();
ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
ctx.fillStyle="red";
ctx.fill();
});

players.forEach(p=>{
if(!p.alive)return;
ctx.beginPath();
ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();
});

requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
