<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finger Dodge</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#111;font-family:Arial,sans-serif;}
canvas{display:block;touch-action:none;}

#ui{
    position:absolute;top:20px;left:20px;color:white;
    font-size:18px;font-weight:bold;
}
</style>
</head>

<body>

<div id="ui">
Zeit: <span id="time">0</span>s
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    joystick1.baseX = 120;
    joystick1.baseY = canvas.height - 120;

    joystick2.baseX = canvas.width - 120;
    joystick2.baseY = canvas.height - 120;
}
window.addEventListener("resize", resize);

// ---------------- JOYSTICKS ----------------
const joystick1 = {
    active:false,
    x:0, y:0,
    baseX:120, baseY:0
};

const joystick2 = {
    active:false,
    x:0, y:0,
    baseX:0, baseY:0
};

// ---------------- PLAYERS ----------------
const player1 = {x:200,y:200,r:18,color:"#00ff88"};
const player2 = {x:400,y:200,r:18,color:"#4488ff"};

// ---------------- BALLS ----------------
let balls = [];

function createBall(){
    balls.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: 15,
        vx:(Math.random()*4-2),
        vy:(Math.random()*4-2)
    });
}

// ---------------- GAME ----------------
let running = true;

// ---------------- JOYSTICK MOVEMENT ----------------
function applyJoystick(j, p){
    if(!j.active) return;

    let dx = j.x - j.baseX;
    let dy = j.y - j.baseY;

    let dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < 10) return;

    let speed = 0.15;

    p.x += dx * speed;
    p.y += dy * speed;
}

// ---------------- UPDATE ----------------
function update(){

    applyJoystick(joystick1, player1);
    applyJoystick(joystick2, player2);

    // balls move
    for(let b of balls){
        b.x += b.vx;
        b.y += b.vy;

        if(b.x < 0 || b.x > canvas.width) b.vx *= -1;
        if(b.y < 0 || b.y > canvas.height) b.vy *= -1;
    }
}

// ---------------- DRAW ----------------
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // balls
    for(let b of balls){
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fillStyle="red";
        ctx.fill();
    }

    drawPlayer(player1);
    drawPlayer(player2);

    drawJoystick(joystick1);
    drawJoystick(joystick2);
}

function drawPlayer(p){
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
}

function drawJoystick(j){
    if(!j.active) return;

    ctx.beginPath();
    ctx.arc(j.baseX,j.baseY,50,0,Math.PI*2);
    ctx.strokeStyle="white";
    ctx.lineWidth=2;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(j.x,j.y,25,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
}

// ---------------- LOOP ----------------
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

// ---------------- TOUCH CONTROLS ----------------
let touches = {};

canvas.addEventListener("touchmove",(e)=>{

    for(let t of e.touches){
        touches[t.identifier] = t;

        if(t.clientX < canvas.width/2){
            joystick1.active = true;
            joystick1.x = t.clientX;
            joystick1.y = t.clientY;
        } else {
            joystick2.active = true;
            joystick2.x = t.clientX;
            joystick2.y = t.clientY;
        }
    }
});

canvas.addEventListener("touchend",(e)=>{

    for(let t of e.changedTouches){
        delete touches[t.identifier];
    }

    if(Object.keys(touches).length === 0){
        joystick1.active = false;
        joystick2.active = false;
    }
});

// ---------------- START ----------------
resize();
createBall();
createBall();
createBall();

loop();
</script>

</body>
</html>
