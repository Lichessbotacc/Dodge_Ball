<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finger Dodge FIX</title>

<style>
body{margin:0;overflow:hidden;background:#111;font-family:Arial}
canvas{display:block;touch-action:none}
#ui{position:absolute;top:10px;left:10px;color:#fff;font-weight:bold}
#menu,#settings,#gameOver{
position:absolute;inset:0;display:flex;
align-items:center;justify-content:center;flex-direction:column;
background:#111;color:white
}
button{padding:12px 20px;margin:5px;font-size:18px}
</style>
</head>

<body>

<div id="ui">
Zeit: <span id="time">0</span>s<br>
Bälle: <span id="balls">0</span><br>
Modus: <span id="mode">-</span>
</div>

<div id="menu">
<h1>Finger Dodge</h1>
<button onclick="start('single')">Single</button>
<button onclick="start('multi')">Multi</button>
<button onclick="start('ai')">AI Spectate</button>
</div>

<div id="settings"></div>

<div id="gameOver" style="display:none">
<h2>Game Over</h2>
<div id="rank"></div>
<button onclick="start(mode)">Restart</button>
</div>

<canvas id="c"></canvas>

<script>
const c=document.getElementById("c");
const x=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let balls=[],players=[],mode="single",running=false;
let idCounter=0,startTime=0;

function Player(name,color){
return{
id:idCounter++,
name,color,
x:Math.random()*c.width,
y:Math.random()*c.height,
r:18,
alive:true,
elo:1500,
points:0
};
}

function Ball(){
return{
x:Math.random()*c.width,
y:Math.random()*c.height,
r:20,
vx:(Math.random()*4-2),
vy:(Math.random()*4-2)
};
}

function start(m){
mode=m;
document.getElementById("menu").style.display="none";
document.getElementById("gameOver").style.display="none";

balls=[];players=[];idCounter=0;
running=true;
startTime=Date.now();

let botCount=8;

if(mode==="single"){
players.push(Player("Du","#0f0"));
for(let i=0;i<botCount;i++)
players.push(Player("Bot"+i,`hsl(${i*40},100%,50%)`));
}

if(mode==="multi"){
players.push(Player("P1","#0f0"));
players.push(Player("P2","#00f"));
for(let i=0;i<botCount;i++)
players.push(Player("Bot"+i,`hsl(${i*40},100%,50%)`));
}

if(mode==="ai"){
for(let i=0;i<botCount;i++)
players.push(Player("Bot"+i,`hsl(${i*40},100%,50%)`));
}

for(let i=0;i<5;i++)balls.push(Ball());
}

function update(){
if(!running)return;

document.getElementById("time").innerText=
Math.floor((Date.now()-startTime)/1000);

balls.forEach(b=>{
b.x+=b.vx;b.y+=b.vy;
if(b.x<0||b.x>c.width)b.vx*=-1;
if(b.y<0||b.y>c.height)b.vy*=-1;
});

players.forEach(p=>{
if(!p.alive)return;

if(mode==="ai"||mode==="single"){
let tx=Math.random()*c.width;
let ty=Math.random()*c.height;
p.x+=(tx-p.x)*0.02;
p.y+=(ty-p.y)*0.02;
}

if(mode==="multi"&&p.name==="P1"){
if(keys.w)p.y-=5;
if(keys.s)p.y+=5;
if(keys.a)p.x-=5;
if(keys.d)p.x+=5;
}

if(mode==="multi"&&p.name==="P2"){
if(keys.ArrowUp)p.y-=5;
if(keys.ArrowDown)p.y+=5;
if(keys.ArrowLeft)p.x-=5;
if(keys.ArrowRight)p.x+=5;
}

balls.forEach(b=>{
let dx=p.x-b.x,dy=p.y-b.y;
if(Math.hypot(dx,dy)<p.r+b.r){
p.alive=false;
checkEnd();
}
});
});
}

function checkEnd(){
let alive=players.filter(p=>p.alive);

if(alive.length<=1){
running=false;

let sorted=[...players].sort((a,b)=>b.alive-a.alive);

document.getElementById("rank").innerHTML=
sorted.map((p,i)=>i+1+". "+p.name).join("<br>");

document.getElementById("gameOver").style.display="flex";
}
}

function draw(){
x.clearRect(0,0,c.width,c.height);

balls.forEach(b=>{
x.beginPath();
x.arc(b.x,b.y,b.r,0,Math.PI*2);
x.fillStyle="red";
x.fill();
});

players.forEach(p=>{
if(!p.alive)return;
x.beginPath();
x.arc(p.x,p.y,p.r,0,Math.PI*2);
x.fillStyle=p.color;
x.fill();
});
}

function loop(){
update();draw();
requestAnimationFrame(loop);
}
loop();

let keys={};
addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);
</script>

</body>
</html>
