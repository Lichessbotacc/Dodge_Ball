<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finger Dodge</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#111;font-family:Arial;}
canvas{display:block;touch-action:none;}

#ui{
position:absolute;top:20px;left:20px;color:white;font-size:18px;
}

#menu{
position:absolute;inset:0;display:flex;flex-direction:column;
justify-content:center;align-items:center;background:#111;color:white;
}

button{
padding:15px 30px;margin:10px;font-size:20px;border-radius:10px;
}

#gameOver{
position:absolute;inset:0;display:none;
justify-content:center;align-items:center;
background:rgba(0,0,0,0.8);color:white;flex-direction:column;
}
</style>
</head>

<body>

<div id="ui">
Zeit: <span id="time">0</span><br>
Modus: <span id="mode">-</span>
</div>

<div id="menu">
<h1>Finger Dodge</h1>
<button onclick="start('single')">Single</button>
<button onclick="start('multi')">Multiplayer</button>
<button onclick="start('ai')">Spectate AI</button>
</div>

<div id="gameOver">
<h1>Game Over</h1>
<button onclick="location.reload()">Restart</button>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){
c.width = innerWidth;
c.height = innerHeight;
}
resize();
addEventListener("resize", resize);

let mode="single";
let running=false;

let balls=[];
let startTime=0;

const keys={};

// ---------------- PLAYERS ----------------
const p1={x:200,y:200,r:18,c:"lime"};
const p2={x:400,y:200,r:18,c:"cyan"};

// ---------------- AI ----------------
function ai(p){
let target=null;
let dMin=99999;

for(let b of balls){
let dx=p.x-b.x;
let dy=p.y-b.y;
let d=Math.hypot(dx,dy);
if(d<dMin){dMin=d;target=b;}
}

if(target){
if(target.x>p.x)p.x+=2;
if(target.x<p.x)p.x-=2;
if(target.y>p.y)p.y+=2;
if(target.y<p.y)p.y-=2;
}
}

// ---------------- BALLS ----------------
function spawn(){
balls.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
vx:(Math.random()*4-2),
vy:(Math.random()*4-2),
r:15
});
}

// ---------------- START ----------------
function start(m){
mode=m;
running=true;
balls=[];
startTime=Date.now();

p1.x=200;p1.y=200;
p2.x=400;p2.y=200;

for(let i=0;i<5;i++)spawn();

document.getElementById("menu").style.display="none";
document.getElementById("mode").innerText=m;
}

// ---------------- INPUT ----------------
addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// ---------------- UPDATE ----------------
function update(){

if(!running)return;

document.getElementById("time").innerText =
Math.floor((Date.now()-startTime)/1000);

// PLAYER CONTROL
if(mode==="single"){
// mouse handled below
}

if(mode==="multi"){
if(keys.w)p1.y-=5;
if(keys.s)p1.y+=5;
if(keys.a)p1.x-=5;
if(keys.d)p1.x+=5;

if(keys.ArrowUp)p2.y-=5;
if(keys.ArrowDown)p2.y+=5;
if(keys.ArrowLeft)p2.x-=5;
if(keys.ArrowRight)p2.x+=5;
}

if(mode==="ai"){
ai(p1);
ai(p2);
}

// BALLS
for(let b of balls){
b.x+=b.vx;
b.y+=b.vy;

if(b.x<0||b.x>c.width)b.vx*=-1;
if(b.y<0||b.y>c.height)b.vy*=-1;
}

// COLLISION
check(p1);
if(mode!=="single")check(p2);
}

// ---------------- COLLISION ----------------
function check(p){
for(let b of balls){
if(Math.hypot(p.x-b.x,p.y-b.y)<p.r+b.r){
running=false;
document.getElementById("gameOver").style.display="flex";
}
}
}

// ---------------- DRAW ----------------
function draw(){
ctx.clearRect(0,0,c.width,c.height);

for(let b of balls){
ctx.beginPath();
ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
ctx.fillStyle="red";
ctx.fill();
}

drawP(p1);
if(mode!=="single")drawP(p2);
}

function drawP(p){
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle=p.c;
ctx.fill();
}

// ---------------- LOOP ----------------
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

// ---------------- MOUSE SINGLE ----------------
c.addEventListener("mousemove",e=>{
if(mode==="single"&&running){
p1.x=e.clientX;
p1.y=e.clientY;
}
});
</script>

</body>
</html>
